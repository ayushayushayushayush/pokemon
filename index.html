<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4D9EFF;
            --primary-dim: rgba(77,158,255,0.12);
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --text-dim: #444;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --accent-gold: #FFD60A;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Lora', Georgia, serif;
            display: flex; flex-direction: column; overflow: hidden;
            overscroll-behavior-y: none;
        }

        header { padding: calc(var(--safe-top) + 16px) 20px 12px; display: flex; justify-content: space-between; align-items: center; }

        .header-btn {
            display: flex; align-items: center; justify-content: center;
            width: 46px; height: 46px; border-radius: var(--radius-sm); cursor: pointer;
            background: var(--surface-3); border: 1px solid var(--border); font-size: 1.7rem;
        }

        /* SEARCH OVERLAY UI */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        #search-overlay.active { display: flex; }
        #search-header {
            padding: calc(var(--safe-top) + 14px) 18px 12px;
            display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border);
        }
        #search-input {
            flex: 1; background: var(--surface-2); border: 1px solid var(--border-bright);
            border-radius: var(--radius-md); padding: 12px 16px; color: #fff; outline: none;
        }
        #search-results { flex: 1; overflow-y: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
        .search-item { padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .search-item:active { background: var(--surface-2); }

        /* DECK PICKER UI */
        #deck-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2100; display: none; flex-direction: column;
        }
        #deck-overlay.active { display: flex; }
        .deck-item { padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; }
        .deck-item.active { color: var(--primary); font-weight: 700; }

        /* RATING BUTTONS UI */
        #rating-bar { 
            display: none; padding: 12px 18px 18px; gap: 8px; 
            border-top: 1px solid var(--border); background: var(--bg);
        }
        .card.is-flipped #rating-bar { display: flex; }
        .rating-btn {
            flex: 1; padding: 12px 0; border-radius: var(--radius-md); 
            background: var(--surface-2); border: 1px solid var(--border);
            text-align: center; font-weight: 700; font-size: 0.85rem;
        }
        .rating-btn.hard { color: var(--delete-red); }
        .rating-btn.okay { color: var(--accent-gold); }
        .rating-btn.easy { color: var(--success-green); }

        /* CORE FLASHCARD UI */
        .counter {
            font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 800;
            background: var(--surface-2); padding: 0 18px; border-radius: 20px;
            border: 1px solid var(--border); height: 40px; display: flex; align-items: center;
        }
        .app-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scene { width: 92%; max-width: 420px; height: 60vh; perspective: 1500px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: var(--radius-xl); border: 1px solid var(--border-bright);
            display: flex; flex-direction: column; overflow: hidden; background: #000;
        }
        .card-front { align-items: center; justify-content: center; text-align: center; }
        .card-back { transform: rotateY(180deg); }
        .word-display { font-family: 'Playfair Display', serif; font-size: 3.2rem; font-weight: 800; }
        .meaning-text { padding: 30px 20px; font-size: 1.2rem; line-height: 1.5; text-align: center; flex: 1; }
        
        .controls { padding: 20px 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface-3); color: white; font-weight: 800; }
        .nav-btn.primary { background: var(--primary); border: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-btn" onclick="toggleDeckPicker()">📚</div>
        <div class="counter" onclick="toggleSearch()" id="counter">0/0</div>
        <div class="header-btn" onclick="shuffleDeck()">🔀</div>
    </header>

    <div class="app-container">
        <div class="scene">
            <div class="card" id="card" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="word-display" id="f-word">WordFlow</div>
                </div>
                <div class="card-face card-back">
                    <div class="meaning-text" id="b-meaning">Definition goes here...</div>
                    <div id="rating-bar">
                        <button class="rating-btn hard" onclick="event.stopPropagation(); rateWord('hard')">Hard</button>
                        <button class="rating-btn okay" onclick="event.stopPropagation(); rateWord('okay')">Okay</button>
                        <button class="rating-btn easy" onclick="event.stopPropagation(); rateWord('easy')">Easy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>

    <div id="search-overlay">
        <div id="search-header">
            <input id="search-input" type="text" placeholder="Search words..." oninput="onSearchInput()">
            <div onclick="toggleSearch()" style="color:var(--primary); font-weight:700;">Cancel</div>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="deck-overlay">
        <header>
            <div class="header-btn" onclick="toggleDeckPicker()" style="font-size: 0.9rem; width: auto; padding: 0 15px;">Done</div>
            <div style="font-weight: 800;">Themed Decks</div>
            <div style="width: 50px;"></div>
        </header>
        <div class="deck-item active" onclick="applyFilter('all', this)">All Words</div>
        <div class="deck-item" onclick="applyFilter('academic', this)">Academic Words</div>
        <div class="deck-item" onclick="applyFilter('nyt', this)">Words from NYT</div>
        <div class="deck-item" onclick="applyFilter('unrated', this)">Never Favorited/Rated</div>
    </div>

    <script>
        // Mock data - in your real app, this is populated via PapaParse
        let wordData = [
            { WORD: "Ambiguous", MEANING: "Open to more than one interpretation.", Type: "Academic" },
            { WORD: "Ambivalent", MEANING: "Having mixed feelings about something.", Type: "Academic" },
            { WORD: "Languid", MEANING: "Displaying or having a disinclination for physical exertion.", Source: "NYT" },
            { WORD: "Ephemeral", MEANING: "Lasting for a very short time.", Source: "NYT" }
        ];

        let filteredIndices = wordData.map((_, i) => i);
        let currentIndex = 0;
        let wordRatings = JSON.parse(localStorage.getItem('wf_ratings') || '{}');

        function updateCard() {
            const idx = filteredIndices[currentIndex];
            const item = wordData[idx];
            document.getElementById('f-word').innerText = item.WORD;
            document.getElementById('b-meaning').innerText = item.MEANING;
            document.getElementById('counter').innerText = `${currentIndex + 1}/${filteredIndices.length}`;
            document.getElementById('card').classList.remove('is-flipped');
        }

        function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

        function nextCard() {
            currentIndex = (currentIndex + 1) % filteredIndices.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + filteredIndices.length) % filteredIndices.length;
            updateCard();
        }

        function shuffleDeck() {
            filteredIndices.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }

        // --- SEARCH FEATURE ---
        function toggleSearch() {
            const el = document.getElementById('search-overlay');
            el.classList.toggle('active');
            if(el.classList.contains('active')) document.getElementById('search-input').focus();
        }

        function onSearchInput() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const results = document.getElementById('search-results');
            results.innerHTML = '';
            
            wordData.forEach((item, index) => {
                if (item.WORD.toLowerCase().includes(q)) {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerText = item.WORD;
                    div.onclick = () => {
                        // Find this word's position in current filtered set or reset filter
                        const filterIdx = filteredIndices.indexOf(index);
                        if(filterIdx !== -1) currentIndex = filterIdx;
                        else {
                            filteredIndices = [index];
                            currentIndex = 0;
                        }
                        updateCard();
                        toggleSearch();
                    };
                    results.appendChild(div);
                }
            });
        }

        // --- THEMED DECKS ---
        function toggleDeckPicker() { document.getElementById('deck-overlay').classList.toggle('active'); }

        function applyFilter(type, el) {
            document.querySelectorAll('.deck-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');

            if (type === 'academic') {
                filteredIndices = wordData.map((w, i) => w.Type === 'Academic' ? i : -1).filter(i => i !== -1);
            } else if (type === 'nyt') {
                filteredIndices = wordData.map((w, i) => w.Source === 'NYT' ? i : -1).filter(i => i !== -1);
            } else if (type === 'unrated') {
                filteredIndices = wordData.map((w, i) => !wordRatings[w.WORD] ? i : -1).filter(i => i !== -1);
            } else {
                filteredIndices = wordData.map((_, i) => i);
            }

            currentIndex = 0;
            updateCard();
            toggleDeckPicker();
        }

        // --- SELF RATING ---
        function rateWord(rating) {
            const word = wordData[filteredIndices[currentIndex]].WORD;
            wordRatings[word] = rating;
            localStorage.setItem('wf_ratings', JSON.stringify(wordRatings));
            
            // Auto-advance to next card after rating
            setTimeout(nextCard, 300);
        }

        // Initialize
        updateCard();
    </script>
</body>
</html>
