<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>WordFlow Pro - Auto Sync</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; 
            --bg: #000000;      
            --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; 
            --text-secondary: #AEAEB2;
            --delete-red: #FF453A;
            --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .counter { 
            font-size: 0.85rem; 
            font-weight: 700;
            color: var(--text-main); 
            background: #3a3a3c; 
            padding: 4px 12px; 
            border-radius: 20px; 
        }

        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: var(--card-bg); 
            display: flex;
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid #38383a;
        }

        .card-front { justify-content: center; align-items: center; text-align: center; padding: 30px; }
        
        .word-container {
            cursor: pointer;
            padding: 20px;
            transition: opacity 0.2s;
        }
        .word-container:active { opacity: 0.6; }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .ipa-sub { font-size: 1.1rem; color: var(--text-secondary); margin-top: 10px; font-family: monospace; }
        
        .flip-hint {
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-back { transform: rotateY(180deg); }
        .scroll-area { height: 100%; overflow-y: auto; padding: 30px; }
        
        .meaning-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; line-height: 1.3; }
        
        .example-container {
            position: relative;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--delete-red); 
        }

        .example-item { 
            position: relative;
            background: var(--example-bg); 
            padding: 16px; 
            border-left: 4px solid var(--primary); 
            font-size: 0.95rem; 
            line-height: 1.5; 
            color: #E5E5EA;
            transition: transform 0.3s ease-out;
            z-index: 2;
            cursor: grab;
        }

        .delete-hint {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 1;
        }

        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 12px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; }
        .nav-btn.primary { background: var(--primary); }
    </style>
</head>
<body>

<div id="loading-screen">
    <p>Connecting to GitHub...</p>
</div>

<header id="app-header" style="display:none;">
    <div onclick="resetDeleted()" style="color:var(--delete-red); font-weight:600; font-size:0.8rem;">Restore All</div>
    <div id="counter" class="counter">0 / 0</div>
    <div onclick="jumpPrompt()" style="color:var(--primary); font-weight:600; font-size:0.9rem;">Jump</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudio(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub"><span id="f-ipa"></span> • <span id="f-phonetic"></span></div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            
            <div class="card-face card-back">
                <div class="scroll-area">
                    <div id="b-meaning" class="meaning-text" onclick="flipCard()">...</div>
                    <div id="example-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const GITHUB_CONFIG = {
    token: "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",
    owner: "ayushayushayushayush",
    repo: "pokemon",
    path: "deleted_examples.txt"
};

let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_ex') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);

window.onload = () => {
    Papa.parse("words.csv", {
        download: true,
        header: true,
        complete: function(results) {
            wordData = results.data.filter(row => row.WORD);
            startApp();
        }
    });
};

function startApp() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app-header').style.display = 'flex';
    updateCard();
}

async function syncToGitHub() {
    const content = btoa(unescape(encodeURIComponent(deletedExamples.join('\n'))));
    const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
    
    let sha = "";
    try {
        const res = await fetch(url, { headers: { Authorization: `token ${GITHUB_CONFIG.token}` } });
        if (res.ok) { const data = await res.json(); sha = data.sha; }
    } catch (e) {}

    await fetch(url, {
        method: "PUT",
        headers: { Authorization: `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
        body: JSON.stringify({
            message: "Sync deleted examples",
            content: content,
            sha: sha
        })
    });
}

function updateCard() {
    if (wordData.length === 0) return;
    const item = wordData[currentIndex];
    const card = document.getElementById('card');
    card.classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);

    document.getElementById('f-word').textContent = item.WORD || "";
    document.getElementById('f-ipa').textContent = item.IPA || "";
    document.getElementById('f-phonetic').textContent = item.PHONETIC || "";
    document.getElementById('b-meaning').textContent = item.MEANING || "";

    const list = document.getElementById('example-list');
    list.innerHTML = "";
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${item.WORD}: ${text}`;
            if (!deletedExamples.includes(exId)) {
                createExampleElement(text, exId, list);
            }
        }
    }
}

function createExampleElement(text, id, container) {
    const wrapper = document.createElement('div');
    wrapper.className = 'example-container';
    wrapper.innerHTML = `<div class="delete-hint">DELETING...</div><div class="example-item">${text}</div>`;
    
    const item = wrapper.querySelector('.example-item');
    let startX = 0;

    item.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
    item.addEventListener('touchmove', (e) => {
        let diff = e.touches[0].clientX - startX;
        if (diff > 0) item.style.transform = `translateX(${diff}px)`;
    }, {passive: true});

    item.addEventListener('touchend', (e) => {
        let currentX = parseInt(item.style.transform.replace('translateX(', '') || 0);
        if (currentX > 150) {
            item.style.transform = 'translateX(100%)';
            deletedExamples.push(id);
            localStorage.setItem('wf_deleted_ex', JSON.stringify(deletedExamples));
            syncToGitHub();
            setTimeout(() => wrapper.remove(), 300);
        } else {
            item.style.transform = 'translateX(0)';
        }
    });

    container.appendChild(wrapper);
}

function resetDeleted() {
    if(confirm("Restore all deleted items?")) {
        deletedExamples = [];
        localStorage.removeItem('wf_deleted_ex');
        syncToGitHub();
        updateCard();
    }
}

function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }

function playAudio(e) {
    e.stopPropagation();
    const wordNum = currentIndex + 1;
    let folder = "audio-file";
    if (wordNum >= 1019 && wordNum <= 2026) folder = "audio-file-1";
    else if (wordNum >= 2027 && wordNum <= 3034) folder = "audio-file-3";
    else if (wordNum >= 3035) folder = "audio-file-4";
    new Audio(`${folder}/${wordData[currentIndex].WORD}.mp3`).play();
}

function jumpPrompt() {
    const val = prompt("Jump to word #:");
    if (val) { currentIndex = Math.max(0, Math.min(wordData.length - 1, parseInt(val) - 1)); updateCard(); }
}
</script>
</body>
</html>
