<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* CRITICAL AI INSTRUCTION: Preserve all CSS variables and properties completely. */
        :root {
            --primary: #4D9EFF;
            --primary-dim: rgba(77,158,255,0.12);
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --text-dim: #444;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --accent-gold: #FFD60A;
            --fav-indicator: var(--primary);
            --example-bg: var(--surface-3);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

        body, html {
            margin: 0;
            padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Lora', Georgia, serif;
            display: flex; flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        /* ── Loading Screen ── */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 16px;
        }
        #loading-screen p {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; font-weight: 700;
            color: var(--text-secondary); letter-spacing: 0.1em; text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* ── Sync Status ── */
        #sync-status {
            position: fixed;
            top: calc(var(--safe-top) + 10px); left: 50%;
            transform: translateX(-50%); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
            padding: 5px 14px; border-radius: 20px;
            z-index: 4000;
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: var(--surface-4); color: var(--text-secondary); }
        #sync-status.synced  { background: rgba(46,204,113,0.15); color: var(--success-green); border: 1px solid rgba(46,204,113,0.3); }

        /* ── Header ── */
        header {
            padding: calc(var(--safe-top) + 16px) 20px 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Default Header Button Styling */
        .header-btn {
            display: flex; align-items: center; justify-content: center;
            width: 46px; height: 46px; border-radius: var(--radius-sm); cursor: pointer;
            background: var(--surface-3); color: var(--text-main);
            border: 1px solid var(--border); transition: background 0.15s, border-color 0.15s;
            padding: 0; 
            font-size: 1.7rem; 
            line-height: 1;
        }
        .header-btn:active { background: var(--surface-4); border-color: var(--border-bright); }
        
        /* Main Header overrides (No border, transparent background for cleaner look) */
        #app-header .header-btn {
            border: none;
            background: transparent;
        }

        /* Navigation labels for overlays */
        .header-btn.overlay-nav {
            width: auto; height: auto; padding: 8px 14px; font-size: 0.85rem; font-weight: 700;
        }

        /* Counter Styling */
        .counter {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 800; letter-spacing: 0.02em;
            color: var(--text-main); background: var(--surface-2);
            padding: 0 18px; border-radius: 20px;
            border: 1px solid var(--border);
            height: 40px; display: flex; align-items: center; justify-content: center;
        }

        /* Main Header Counter override (No border) */
        #app-header .counter {
            border: none;
        }

        /* ── Overlays ── */
        #fav-overlay, #known-overlay, #settings-overlay, #quiz-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }

        .list-container { flex: 1; overflow-y: auto; padding: 8px 18px 24px; -webkit-overflow-scrolling: touch; }
        #fav-overlay { user-select: none; -webkit-user-select: none; }

        /* ── Settings ── */
        .settings-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .settings-item {
            background: var(--surface-2);
            padding: 18px 20px; border-radius: var(--radius-md);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600; font-size: 0.95rem;
            border: 1px solid var(--border);
            transition: background 0.15s;
        }
        .settings-item:active { background: var(--surface-3); }
        .chevron { color: var(--text-dim); font-size: 1.3rem; }

        /* ── Quiz UI ── */
        .quiz-container { padding: 12px 16px 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        .quiz-header-info {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--surface-2); padding: 14px 20px;
            border-radius: var(--radius-md); border: 1px solid var(--border);
        }
        .quiz-stat { display: flex; flex-direction: column; align-items: center; }
        .quiz-stat-val { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 800; }
        .quiz-stat-label { font-size: 0.55rem; color: var(--text-secondary); text-transform: uppercase; }

        .quiz-sentence {
            font-size: 1.1rem; font-weight: 400; line-height: 1.7;
            background: var(--surface-2); padding: 22px 20px; border-radius: var(--radius-md);
            border: 1px solid var(--border); min-height: 110px;
        }
        .quiz-sentence b { color: var(--primary); font-weight: 800; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn {
            background: var(--surface-2); border: 1px solid var(--border-bright);
            padding: 14px 10px; border-radius: var(--radius-md); text-align: center;
            min-height: 90px; display: flex; flex-direction: column; justify-content: center;
        }
        .opt-word { font-size: 1.2rem; font-weight: 700; }
        .opt-ipa { font-size: 0.85rem; color: #888; font-family: monospace; }
        .option-btn.correct { background: rgba(46,204,113,0.18); border-color: var(--success-green); color: var(--success-green); }
        .option-btn.wrong { background: rgba(255,69,69,0.18); border-color: var(--delete-red); color: var(--delete-red); }

        /* ── Main Card Page ── */
        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 18px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.65s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: var(--radius-xl); background: var(--surface-1);
            border: 1px solid var(--border-bright); display: flex; flex-direction: column;
        }
        .card-front { justify-content: center; align-items: center; text-align: center; padding: 40px 30px; }
        .word-display { font-family: 'Playfair Display', serif; font-size: 3.6rem; font-weight: 800; margin: 0; }
        .ipa-sub { font-size: 1rem; color: var(--text-secondary); font-family: monospace; margin-top: 18px; }

        .card-back { transform: rotateY(180deg); }
        .back-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); }
        .back-word { font-family: 'Playfair Display', serif; font-size: 1.55rem; font-weight: 800; color: var(--delete-red); text-transform: uppercase; margin: 0; }
        .meaning-text { font-size: 1.1rem; font-weight: 500; line-height: 1.5; margin-top: 10px; }
        
        .example-item {
            background: var(--surface-2); padding: 14px 16px; font-size: 0.9rem;
            margin-bottom: 10px; border-radius: var(--radius-md); border: 1px solid var(--border);
        }

        /* Nav controls */
        .controls { padding: 16px 18px calc(var(--safe-bottom) + 28px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { 
            flex: 1; height: 62px; border-radius: var(--radius-md); border: 1px solid var(--border);
            background: var(--surface-3); color: var(--text-main);
            font-weight: 800; font-size: 1.1rem; 
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn.primary { background: var(--primary); border-color: transparent; }

        .fav-group-header { margin: 22px 0 10px 4px; display: flex; align-items: baseline; gap: 10px; }
        .fav-group-title { font-family: 'Playfair Display', serif; color: var(--delete-red); font-size: 0.95rem; font-weight: 800; text-transform: uppercase; }
        .fav-group-ipa { color: var(--text-dim); font-size: 0.82rem; font-family: monospace; }
    </style>
</head>

<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>Loading...</p></div>

<div id="settings-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn overlay-nav" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Settings</div>
        <div style="width: 60px;"></div>
    </header>
    <div class="list-container">
        <div class="settings-list">
            <div class="settings-item" onclick="openKnown()">
                <span>Mastered Words</span>
                <span class="chevron">›</span>
            </div>
            <div class="settings-item" onclick="resetDeleted()">
                <span style="color:var(--delete-red);">Restore Deleted Examples</span>
                <span class="chevron">›</span>
            </div>
        </div>
    </div>
</div>

<div id="quiz-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn overlay-nav" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Quiz Mode</div>
        <div style="width: 60px;"></div>
    </header>
    <div class="quiz-container">
        <div class="quiz-header-info">
            <div class="quiz-stat"><span id="quiz-score-display" class="quiz-stat-val" style="color:var(--success-green);">0</span><span class="quiz-stat-label">Right</span></div>
            <div class="quiz-stat"><span id="quiz-wrong-display" class="quiz-stat-val" style="color:var(--delete-red);">0</span><span class="quiz-stat-label">Wrong</span></div>
            <div class="quiz-stat"><span id="quiz-total-display" class="quiz-stat-val">0</span><span class="quiz-stat-label">Total</span></div>
            <div class="quiz-stat"><span id="quiz-remaining-display" class="quiz-stat-val">0</span><span class="quiz-stat-label">Left</span></div>
        </div>
        <div id="quiz-question" class="quiz-sentence"></div>
        <div id="quiz-meaning" class="example-item" onclick="cycleQuizMeaning()" style="font-style:italic;"></div>
        <div id="quiz-options" class="options-grid"></div>
    </div>
</div>

<div id="fav-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn overlay-nav" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Favorites</div>
        <div class="header-btn overlay-nav" style="font-size: 1.15rem;" onclick="startQuiz(event)">💡</div>
    </header>
    <div id="fav-list" class="list-container"></div>
</div>

<div id="known-overlay">
    <header>
        <div onclick="openSettings()" class="header-btn overlay-nav" style="color:var(--primary);">← Settings</div>
        <div style="font-weight:800;">Mastered</div>
        <div onclick="removeAllKnown()" class="header-btn overlay-nav" style="color:var(--delete-red);">Remove All</div>
    </header>
    <div id="known-list" class="list-container"></div>
</div>

<header id="app-header" style="display:none;">
    <div class="header-btn" onclick="openSettings()">⚙️</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
    <div class="header-btn fav-btn" onclick="openFavs()">★</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front" onclick="handleCardFrontClick(event)">
                <div id="front-word-container">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span><br>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
            </div>
            <div class="card-face card-back">
                <div class="back-header" onclick="flipCard()">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <p id="b-word" class="back-word" onclick="playAudioFromEvent(event)">...</p>
                        <div id="more-btn" style="background:var(--primary-dim); color:var(--primary); font-size:0.6rem; padding:4px 8px; border-radius:6px; font-weight:700;" onclick="handleMoreClick(event)">MORE</div>
                    </div>
                    <p id="b-meaning" class="meaning-text">...</p>
                </div>
                <div id="example-list" style="overflow-y:auto; flex:1; padding:15px;"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
// CRITICAL AI INSTRUCTION: DO NOT TRUNCATE, SUMMARIZE, OR REMOVE ANY OF THE JAVASCRIPT CODE BELOW. PRESERVE EVERY FUNCTION.

// API Config
const BIN_ID = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// App State
let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let favExamples = JSON.parse(localStorage.getItem('wf_fav_log') || "[]");
let knownWords = JSON.parse(localStorage.getItem('wf_known_words') || "[]");

let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let availableMeanings = [];
let currentMeaningIdx = 0;
let syncTimeout = null;

let masteryTimer = null;
let masteryMoved = false;

// Quiz State
let quizPool = [], quizScore = 0, quizWrong = 0, isQuizLocked = false, currentQuizCorrect = "";
let quizMeanings = [], quizMeaningIdx = 0;

// CRITICAL AI INSTRUCTION: PRESERVE showSync FUNCTION
function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`;
    el.textContent = message;
    setTimeout(() => el.className = '', 2000);
}

// CRITICAL AI INSTRUCTION: PRESERVE window.onload FUNCTION
window.onload = () => {
    setupMasteryGesture();
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            
            fetch(BIN_URL + "/latest", { headers: { "X-Master-Key": API_KEY } })
                .then(r => r.json())
                .then(d => {
                    deletedExamples = Array.from(new Set([...(d.record?.deleted || []), ...deletedExamples]));
                    favExamples = Array.from(new Set([...(d.record?.favs || []), ...favExamples]));
                    knownWords = Array.from(new Set([...(d.record?.known || []), ...knownWords]));
                    saveAndSync(false);
                }).catch(() => {});

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            
            if(knownWords.includes(wordData[currentIndex].WORD.trim())) nextCard();
            else updateCard();
        }
    });
};

// CRITICAL AI INSTRUCTION: PRESERVE setupMasteryGesture FUNCTION
function setupMasteryGesture() {
    const container = document.getElementById('front-word-container');
    container.addEventListener('touchstart', () => {
        masteryMoved = false;
        masteryTimer = setTimeout(() => { if (!masteryMoved) confirmMastery(); }, 750);
    }, {passive: true});
    container.addEventListener('touchmove', () => { masteryMoved = true; clearTimeout(masteryTimer); }, {passive: true});
    container.addEventListener('touchend', () => clearTimeout(masteryTimer));
}

// CRITICAL AI INSTRUCTION: PRESERVE confirmMastery FUNCTION
function confirmMastery() {
    const word = wordData[currentIndex].WORD.trim();
    if (confirm(`Mark "${word}" as mastered?`)) {
        if(!knownWords.includes(word)) {
            knownWords.push(word);
            saveAndSync();
            nextCard();
        }
    }
}

// CRITICAL AI INSTRUCTION: PRESERVE handleCardFrontClick FUNCTION
function handleCardFrontClick(e) {
    if (e.target.closest('#front-word-container')) playAudioByIndex(currentIndex);
    else flipCard();
}

// CRITICAL AI INSTRUCTION: PRESERVE updateCard FUNCTION
function updateCard() {
    const item = wordData[currentIndex];
    availableMeanings = [];
    if (item.MEANING?.trim()) availableMeanings.push(item.MEANING.trim());
    for(let i=1; i<=10; i++) {
        let val = item[`Meaning${i}`];
        if(val?.trim()) availableMeanings.push(val.trim());
    }
    currentMeaningIdx = 0;
    
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);
    
    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA;
    document.getElementById('f-phonetic').textContent = item.PHONETIC;
    
    document.getElementById('b-word').textContent = item.WORD;
    document.getElementById('b-meaning').textContent = availableMeanings[0] || "";
    
    const moreBtn = document.getElementById('more-btn');
    moreBtn.style.display = availableMeanings.length > 1 ? 'block' : 'none';
    if(moreBtn.style.display === 'block') moreBtn.textContent = `MORE 1/${availableMeanings.length}`;
    
    renderExamples(item);
}

// CRITICAL AI INSTRUCTION: PRESERVE renderExamples FUNCTION
function renderExamples(item) {
    const list = document.getElementById('example-list');
    list.innerHTML = "";
    const cleanWord = item.WORD.trim();
    const rows = [];

    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text?.trim().length > 1) {
            const exId = `${cleanWord}|${text.trim()}`;
            if (!deletedExamples.includes(exId)) {
                rows.push({ text: text.trim(), id: exId, isFav: favExamples.includes(exId) });
            }
        }
    }

    rows.sort((a,b) => b.isFav - a.isFav).forEach((ex, idx) => {
        const div = document.createElement('div');
        div.className = 'example-item';
        div.innerHTML = `<strong>${idx+1}.</strong> ${ex.text}`;
        if (ex.isFav) div.style.color = '#FF4545';
        
        let pressTimer = null, moved = false;
        div.addEventListener('touchstart', (e) => {
            moved = false; let startX = e.touches[0].clientX;
            pressTimer = setTimeout(() => {
                if (moved) return;
                if (startX > window.innerWidth / 2) {
                    toggleFav(ex.id, div);
                } else {
                    if (confirm("Delete?")) deleteEx(ex.id, div);
                }
            }, (startX > window.innerWidth / 2 ? 1200 : 750));
        }, {passive: true});
        div.addEventListener('touchmove', () => { moved = true; clearTimeout(pressTimer); }, {passive: true});
        div.addEventListener('touchend', () => clearTimeout(pressTimer));
        list.appendChild(div);
    });
}

// CRITICAL AI INSTRUCTION: PRESERVE toggleFav FUNCTION
function toggleFav(id, el) {
    if (favExamples.includes(id)) {
        favExamples = favExamples.filter(x => x !== id);
        if (el) el.style.color = '';
    } else {
        favExamples.push(id);
        if (el) el.style.color = '#FF4545';
    }
    saveAndSync();
}

// CRITICAL AI INSTRUCTION: PRESERVE deleteEx FUNCTION
function deleteEx(id, el) { 
    deletedExamples.push(id); 
    saveAndSync(); 
    el.remove(); 
}

// CRITICAL AI INSTRUCTION: PRESERVE flipCard FUNCTION
function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

// CRITICAL AI INSTRUCTION: PRESERVE playAudioFromEvent FUNCTION
function playAudioFromEvent(e) { e.stopPropagation(); playAudioByIndex(currentIndex); }

// CRITICAL AI INSTRUCTION: PRESERVE playAudioByIndex FUNCTION
function playAudioByIndex(idx) {
    if (idx < 0 || idx >= wordData.length) return;
    const w = wordData[idx].WORD, n = idx + 1;
    let folder = "audio-file";
    if (n >= 3035) folder = "audio-file-4";
    else if (n >= 2027) folder = "audio-file-3";
    else if (n >= 1019) folder = "audio-file-2";
    new Audio(`${folder}/${w}.mp3`).play().catch(()=>{});
}

// CRITICAL AI INSTRUCTION: PRESERVE handleMoreClick FUNCTION
function handleMoreClick(e) {
    e.stopPropagation();
    currentMeaningIdx = (currentMeaningIdx + 1) % availableMeanings.length;
    document.getElementById('b-meaning').textContent = availableMeanings[currentMeaningIdx];
    document.getElementById('more-btn').textContent = `MORE ${currentMeaningIdx+1}/${availableMeanings.length}`;
}

// CRITICAL AI INSTRUCTION: PRESERVE jumpPrompt FUNCTION
function jumpPrompt() {
    const val = prompt("Jump to #:");
    if (val && !isNaN(val)) {
        currentIndex = Math.max(0, Math.min(wordData.length - 1, parseInt(val) - 1));
        updateCard();
    }
}

// CRITICAL AI INSTRUCTION: PRESERVE Navigation FUNCTIONS
function prevCard() {
    let start = currentIndex;
    do { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; if(currentIndex === start) break; } 
    while (knownWords.includes(wordData[currentIndex].WORD.trim()));
    updateCard();
}
function nextCard() {
    let start = currentIndex;
    do { currentIndex = (currentIndex + 1) % wordData.length; if(currentIndex === start) break; } 
    while (knownWords.includes(wordData[currentIndex].WORD.trim()));
    updateCard();
}
function shuffleCard() {
    let attempts = 0, nextIdx;
    do { nextIdx = Math.floor(Math.random() * wordData.length); attempts++; } 
    while (knownWords.includes(wordData[nextIdx].WORD.trim()) && attempts < 100);
    currentIndex = nextIdx;
    updateCard();
}

// CRITICAL AI INSTRUCTION: PRESERVE Overlay Management FUNCTIONS
function openSettings() { closeOverlays(); document.getElementById('settings-overlay').style.display = 'flex'; }
function openFavs() {
    const list = document.getElementById('fav-list'); list.innerHTML = "";
    document.getElementById('fav-overlay').style.display = 'flex';
    if (!favExamples.length) { list.innerHTML = "<p style='text-align:center;color:gray;margin-top:50px;'>No favorites.</p>"; return; }
    
    const groups = {};
    favExamples.forEach(id => {
        const [w, t] = id.split('|');
        if(!groups[w]) {
            const m = wordData.find(x => x.WORD.trim().toLowerCase() === w.toLowerCase());
            groups[w] = { idx: wordData.indexOf(m), ipa: m?.IPA || '', items: [] };
        }
        groups[w].items.push({id, text: t});
    });

    Object.keys(groups).forEach(w => {
        const h = document.createElement('div'); h.className = 'fav-group-header';
        h.innerHTML = `<div class="fav-group-title">${w}</div><div class="fav-group-ipa">${groups[w].ipa}</div>`;
        
        let t; h.querySelector('.fav-group-title').addEventListener('touchstart', () => {
            t = setTimeout(() => { currentIndex = groups[w].idx; closeOverlays(); setTimeout(flipCard, 50); }, 750);
        }, {passive:true});
        h.querySelector('.fav-group-title').addEventListener('touchend', () => clearTimeout(t));
        h.querySelector('.fav-group-ipa').onclick = () => playAudioByIndex(groups[w].idx);
        
        list.appendChild(h);
        groups[w].items.forEach(i => {
            const div = document.createElement('div'); div.className = 'example-item'; div.textContent = i.text;
            let et; div.addEventListener('touchstart', (e) => {
                if(e.touches[0].clientX < window.innerWidth/2) et = setTimeout(() => { if(confirm("Unfavorite?")) { toggleFav(i.id); div.remove(); } }, 750);
            }, {passive:true});
            div.addEventListener('touchend', () => clearTimeout(et));
            list.appendChild(div);
        });
    });
}

function openKnown() {
    const list = document.getElementById('known-list'); list.innerHTML = "";
    document.getElementById('settings-overlay').style.display = 'none';
    document.getElementById('known-overlay').style.display = 'flex';
    knownWords.slice().reverse().forEach(w => {
        const item = wordData.find(x => x.WORD.trim() === w);
        const div = document.createElement('div'); div.className = 'example-item';
        div.style.display = 'flex'; div.style.justifyContent = 'space-between';
        div.innerHTML = `<span><b>${w}</b></span><span style="font-family:monospace;color:gray;">${item?.IPA || ''}</span>`;
        let t; div.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX < window.innerWidth/2) t = setTimeout(() => { if(confirm(`Restore "${w}"?`)) { knownWords = knownWords.filter(x => x !== w); saveAndSync(); openKnown(); } }, 750);
        }, {passive:true});
        div.addEventListener('touchend', () => clearTimeout(t));
        list.appendChild(div);
    });
}

function removeAllKnown() { if(confirm("Clear all mastered words?")) { knownWords = []; saveAndSync(); openKnown(); } }
function closeOverlays() { document.querySelectorAll('#fav-overlay, #known-overlay, #settings-overlay, #quiz-overlay').forEach(o => o.style.display='none'); }
function resetDeleted() { if(confirm("Restore all deleted examples?")) { deletedExamples = []; saveAndSync(); alert("Restored!"); } }

// CRITICAL AI INSTRUCTION: PRESERVE Quiz Logic FUNCTIONS
function startQuiz(e) {
    e.stopPropagation();
    if (!favExamples.length) return alert("No favorites!");
    quizPool = [...favExamples]; quizScore = 0; quizWrong = 0;
    document.getElementById('fav-overlay').style.display = 'none';
    document.getElementById('quiz-overlay').style.display = 'flex';
    document.getElementById('quiz-total-display').textContent = favExamples.length;
    nextQuizQuestion();
}

function nextQuizQuestion() {
    if (!quizPool.length) { alert("Quiz Finished!"); return closeOverlays(); }
    isQuizLocked = false;
    document.getElementById('quiz-remaining-display').textContent = quizPool.length;
    const pi = Math.floor(Math.random() * quizPool.length);
    const rid = quizPool.splice(pi, 1)[0];
    const [w, s] = rid.split('|');
    currentQuizCorrect = w.trim();
    
    const qd = wordData.find(x => x.WORD.trim().toLowerCase() === currentQuizCorrect.toLowerCase());
    quizMeanings = []; if(qd?.MEANING?.trim()) quizMeanings.push(qd.MEANING.trim());
    for(let i=1; i<=10; i++) { if(qd?.[`Meaning${i}`]?.trim()) quizMeanings.push(qd[`Meaning${i}`].trim()); }
    quizMeaningIdx = 0; cycleQuizMeaning(true);

    const regex = new RegExp(`\\b(?:${currentQuizCorrect.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}|${currentQuizCorrect.endsWith('e')?currentQuizCorrect.slice(0,-1):currentQuizCorrect})\\w*`, 'gi');
    document.getElementById('quiz-question').innerHTML = s.replace(regex, "<b>_________</b>");

    let opts = [currentQuizCorrect];
    while(opts.length < 6) {
        let r = wordData[Math.floor(Math.random()*wordData.length)].WORD.trim();
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const grid = document.getElementById('quiz-options'); grid.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('div'); b.className = 'option-btn';
        const od = wordData.find(x => x.WORD.trim() === o);
        b.innerHTML = `<span class="opt-word">${o}</span><span class="opt-ipa">${od?.IPA || ''}</span>`;
        b.onclick = () => {
            if(isQuizLocked) return; isQuizLocked = true;
            if(o === currentQuizCorrect) { b.classList.add('correct'); quizScore++; }
            else { 
                b.classList.add('wrong'); 
                Array.from(grid.children).forEach(child => { if(child.querySelector('.opt-word').textContent === currentQuizCorrect) child.classList.add('correct'); });
                quizWrong++; 
            }
            document.getElementById('quiz-score-display').textContent = quizScore;
            document.getElementById('quiz-wrong-display').textContent = quizWrong;
            setTimeout(nextQuizQuestion, 1200);
        };
        grid.appendChild(b);
    });
}

function cycleQuizMeaning(init = false) {
    if(!init) quizMeaningIdx = (quizMeaningIdx + 1) % (quizMeanings.length || 1);
    document.getElementById('quiz-meaning').textContent = quizMeanings[quizMeaningIdx] || "—";
}

// CRITICAL AI INSTRUCTION: PRESERVE Data Sync FUNCTIONS
function saveAndSync(push = true) {
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
    localStorage.setItem('wf_known_words', JSON.stringify(knownWords));
    if(push) {
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(async () => {
            showSync('syncing', 'Syncing...');
            try {
                await fetch(BIN_URL, {
                    method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ deleted: deletedExamples, favs: favExamples, known: knownWords })
                });
                showSync('synced', 'Synced');
            } catch(e) {}
        }, 1500);
    }
}
