<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #007AFF; 
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Loading Overlay */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid #d1d1d6; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header */
        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .counter { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); background: #e5e5ea; padding: 4px 12px; border-radius: 20px; }

        /* Flashcard Area */
        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: var(--card-bg); display: flex; flex-direction: column; overflow: hidden;
        }

        .audio-btn {
            position: absolute; top: 25px; right: 25px; width: 44px; height: 44px;
            background: #f2f2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; font-size: 1.2rem; z-index: 10;
        }

        /* Front Face */
        .card-front { justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        .ipa-sub { font-size: 1.1rem; color: var(--text-secondary); margin-top: 10px; font-family: monospace; }

        /* Back Face */
        .card-back { transform: rotateY(180deg); }
        .scroll-area { height: 100%; overflow-y: auto; padding: 30px; -webkit-overflow-scrolling: touch; }
        
        .type-tag { font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .meaning-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; line-height: 1.3; }
        
        .example-item { 
            background: #f8f9ff; padding: 16px; border-left: 4px solid var(--primary); 
            border-radius: 12px; margin-bottom: 12px; font-size: 0.95rem; line-height: 1.5; color: #3a3a3c; 
        }

        .section-label { font-size: 0.7rem; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* Controls */
        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 12px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: white; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p style="color: var(--text-secondary); font-weight: 500;">Loading 3500 Words...</p>
</div>

<header id="app-header" style="display:none;">
    <div style="width: 40px;"></div>
    <div id="counter" class="counter">0 / 0</div>
    <div onclick="jumpPrompt()" style="color:var(--primary); font-weight:600; font-size:0.9rem;">Jump</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <button class="audio-btn" onclick="playAudio(event)">🔊</button>
                <h1 id="f-word" class="word-display">...</h1>
                <div class="ipa-sub"><span id="f-ipa"></span> • <span id="f-phonetic"></span></div>
            </div>
            <div class="card-face card-back">
                <div class="scroll-area">
                    <span id="b-type" class="type-tag"></span>
                    <div id="b-meaning" class="meaning-text">...</div>
                    
                    <div style="color:#8e8e93; font-size:0.9rem; margin-bottom:20px;">
                        <span id="b-ipa"></span> • <span id="b-phonetic"></span>
                    </div>

                    <span class="section-label">Usage Examples</span>
                    <div id="example-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard(event)">Back</button>
        <button class="nav-btn primary" onclick="nextCard(event)">Next Word</button>
    </div>
</div>

<script>
let wordData = [];
let currentIndex = parseInt(localStorage.getItem('wf_index_v5') || 0);

// Auto-load words.csv from the same folder
window.onload = () => {
    Papa.parse("words.csv", {
        download: true,
        header: true,
        dynamicTyping: true,
        skipEmptyLines: true,
        complete: function(results) {
            wordData = results.data;
            if (wordData.length > 0) {
                startApp();
            } else {
                document.getElementById('loading-screen').innerHTML = "<p>Error: words.csv is empty or missing.</p>";
            }
        },
        error: function() {
            document.getElementById('loading-screen').innerHTML = "<p>Error: Could not find words.csv beside index.html.</p>";
        }
    });
};

function startApp() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app-header').style.display = 'flex';
    updateCard();
}

function updateCard() {
    const item = wordData[currentIndex];
    const card = document.getElementById('card');
    card.classList.remove('is-flipped');
    
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v5', currentIndex);

    setTimeout(() => {
        // Shared Front/Back Content
        document.getElementById('f-word').textContent = item.WORD || "";
        document.getElementById('f-ipa').textContent = item.IPA || "";
        document.getElementById('f-phonetic').textContent = item.PHONETIC || "";
        
        document.getElementById('b-ipa').textContent = item.IPA || "";
        document.getElementById('b-phonetic').textContent = item.PHONETIC || "";
        document.getElementById('b-type').textContent = item.Type || "";
        document.getElementById('b-meaning').textContent = item.MEANING || "";

        // Process Examples (Check all numerical columns 1-50)
        const list = document.getElementById('example-list');
        list.innerHTML = "";
        for (let i = 1; i <= 50; i++) {
            const ex = item[i.toString()];
            if (ex && ex.toString().trim().length > 1) {
                const div = document.createElement('div');
                div.className = 'example-item';
                div.textContent = ex;
                list.appendChild(div);
            }
        }
        document.querySelector('.scroll-area').scrollTop = 0;
    }, 150);
}

function nextCard(e) {
    e.stopPropagation();
    currentIndex = (currentIndex + 1) % wordData.length;
    updateCard();
}

function prevCard(e) {
    e.stopPropagation();
    currentIndex = (currentIndex - 1 + wordData.length) % wordData.length;
    updateCard();
}

function playAudio(e) {
    e.stopPropagation();
    const word = wordData[currentIndex].WORD;
    // Standard relative path for audio files
    const audio = new Audio(`audio-file/${word}.mp3`);
    audio.play().catch(err => alert("Audio file not found for: " + word));
}

function jumpPrompt() {
    const target = prompt(`Enter word number (1-${wordData.length}):`, currentIndex + 1);
    if (target && !isNaN(target)) {
        const idx = parseInt(target) - 1;
        if (idx >= 0 && idx < wordData.length) {
            currentIndex = idx;
            updateCard();
        }
    }
}

// Swipe Support
let touchstartX = 0;
let touchendX = 0;
document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    if (touchendX < touchstartX - 70) nextCard({stopPropagation:()=>{}});
    if (touchendX > touchstartX + 70) prevCard({stopPropagation:()=>{}});
});
</script>
</body>
</html>
