<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>WordFlow Pro - Multi-Meaning</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; 
            --bg: #000000;      
            --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; 
            --text-secondary: #AEAEB2;
            --delete-red: #FF453A;
            --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }

        #sync-status {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: #3a3a3c; color: var(--text-secondary); }
        #sync-status.synced  { background: #1c3a1c; color: #30d158; }
        #sync-status.error   { background: #3a1c1c; color: var(--delete-red); }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .counter { 
            font-size: 0.85rem; 
            font-weight: 700;
            color: var(--text-main); 
            background: #3a3a3c; 
            padding: 4px 12px; 
            border-radius: 20px; 
        }

        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: var(--card-bg); 
            display: flex;
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid #38383a;
        }

        .card-front { 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center; 
            padding: 60px 30px; 
        }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .ipa-sub { 
            font-size: 1.2rem; 
            color: var(--text-secondary); 
            margin-top: 15px; 
            font-family: monospace; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flip-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 15px;
            cursor: pointer;
        }

        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }
        
        .back-header { 
            padding: 30px 30px 15px; 
            border-bottom: 1px solid #38383a;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .back-word {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--delete-red);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meaning-text { 
            font-size: 1.3rem; 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.3; 
            margin: 0;
            min-height: 1.6em;
            transition: color 0.2s ease;
        }

        .meaning-hint {
            font-size: 0.7rem;
            color: var(--primary);
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        #example-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px 30px 30px; 
            -webkit-overflow-scrolling: touch;
        }

        .example-item { 
            background: var(--example-bg); 
            padding: 16px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            color: #E5E5EA;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: opacity 0.3s ease, transform 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .ex-num {
            color: #FFFFFF;
            font-weight: 800;
            margin-right: 8px;
        }

        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; font-size: 0.9rem; }
        .nav-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>Loading...</p></div>

<header id="app-header" style="display:none;">
    <div onclick="resetDeleted()" style="color:var(--delete-red); font-weight:600; font-size:0.8rem;">Restore</div> 
    <div id="counter" class="counter">0 / 0</div>
    <div onclick="jumpPrompt()" style="color:var(--primary); font-weight:600; font-size:0.9rem;">Jump</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudio(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            
            <div class="card-face card-back">
                <div class="back-header" id="back-header-touch">
                    <p id="b-word" class="back-word">...</p>
                    <p id="b-meaning" class="meaning-text">...</p>
                    <div id="meaning-nav-hint" class="meaning-hint"></div>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
// ─── CONFIGURATION ───
const BIN_ID  = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ─── STATE ───
let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let syncTimeout = null;
let currentMeaningIdx = 0;

// ─── SYNC UI ───
function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`;
    el.textContent = message;
    clearTimeout(el._hideTimer);
    if (state !== 'syncing') el._hideTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ─── CLOUD SYNC ───
async function fetchDeletedFromCloud() {
    try {
        const res = await fetch(BIN_URL + "/latest", { headers: { "X-Master-Key": API_KEY } });
        if (!res.ok) throw new Error();
        const data = await res.json();
        const cloudList = data.record?.deleted || [];
        deletedExamples = Array.from(new Set([...cloudList, ...deletedExamples]));
        localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    } catch (e) { console.warn("Cloud fetch failed."); }
}

function pushDeletedToCloud() {
    clearTimeout(syncTimeout);
    showSync('syncing', '↑ Syncing…');
    syncTimeout = setTimeout(async () => {
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ deleted: deletedExamples })
            });
            showSync('synced', '✓ Synced');
        } catch (e) { showSync('error', '⚠ Sync error'); }
    }, 1000);
}

// ─── BOOT ───
window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            await fetchDeletedFromCloud();
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            setupDoubleTap();
            updateCard();
        }
    });
};

// ─── DOUBLE TAP LOGIC ───
function setupDoubleTap() {
    const header = document.getElementById('back-header-touch');
    let lastTap = 0;
    
    header.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        if (tapLength < 300 && tapLength > 0) {
            // Double Tap Detected
            cycleMeaning();
            e.preventDefault();
        } else {
            // Single Tap -> Flip Back
            // We use a small timeout to ensure it wasn't the first half of a double tap
            this.singleTapTimeout = setTimeout(() => {
                if (new Date().getTime() - lastTap >= 300) {
                    flipCard();
                }
            }, 300);
        }
        lastTap = currentTime;
    });

    // Handle standard clicks for non-touch
    header.addEventListener('dblclick', cycleMeaning);
}

function cycleMeaning() {
    const item = wordData[currentIndex];
    const meanings = getAvailableMeanings(item);
    if (meanings.length <= 1) return;

    currentMeaningIdx = (currentMeaningIdx + 1) % meanings.length;
    displayCurrentMeaning(meanings);
}

function getAvailableMeanings(item) {
    // Collect the main MEANING plus meaning1 through meaning10
    const list = [item.MEANING];
    for (let i = 1; i <= 10; i++) {
        const val = item[`meaning${i}`];
        if (val && val.trim().length > 0) {
            list.push(val.trim());
        }
    }
    return list;
}

function displayCurrentMeaning(meanings) {
    const mText = document.getElementById('b-meaning');
    const mHint = document.getElementById('meaning-nav-hint');
    
    mText.style.opacity = '0';
    setTimeout(() => {
        mText.textContent = meanings[currentMeaningIdx];
        mText.style.opacity = '1';
        
        if (meanings.length > 1) {
            mHint.textContent = `Meaning ${currentMeaningIdx + 1} of ${meanings.length} • Double tap for more`;
        } else {
            mHint.textContent = "";
        }
    }, 150);
}

// ─── RENDER ───
function updateCard() {
    const item = wordData[currentIndex];
    currentMeaningIdx = 0; // Reset meaning index for new card
    
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);

    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA;
    document.getElementById('f-phonetic').textContent = item.PHONETIC;
    document.getElementById('b-word').textContent = item.WORD;
    
    const meanings = getAvailableMeanings(item);
    displayCurrentMeaning(meanings);

    const list = document.getElementById('example-list');
    list.innerHTML = "";
    let exampleCounter = 1;

    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${item.WORD}|${text.trim()}`;
            if (!deletedExamples.includes(exId)) {
                const exDiv = document.createElement('div');
                exDiv.className = 'example-item';
                exDiv.innerHTML = `<span class="ex-num">${exampleCounter}.</span>${text}`;
                
                let pressTimer;
                const start = () => pressTimer = setTimeout(() => {
                    if (confirm("Delete example?")) deleteEx(exId, exDiv);
                }, 750);
                const end = () => clearTimeout(pressTimer);

                exDiv.addEventListener('touchstart', start, {passive: true});
                exDiv.addEventListener('touchend', end);
                exDiv.addEventListener('touchmove', end);
                exDiv.addEventListener('contextmenu', (e) => e.preventDefault());

                list.appendChild(exDiv);
                exampleCounter++;
            }
        }
    }
}

function deleteEx(id, el) {
    el.style.opacity = '0';
    el.style.transform = 'scale(0.95)';
    setTimeout(() => {
        deletedExamples.push(id);
        localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
        el.remove();
        pushDeletedToCloud();
    }, 200);
}

// ─── AUDIO LOGIC ───
function playAudio(e) {
    if (e) e.stopPropagation();
    const wordNum = currentIndex + 1;
    const wordText = wordData[currentIndex].WORD;
    let folder = "audio-file";

    if (wordNum >= 1 && wordNum <= 1018) {
        folder = "audio-file";
    } else if (wordNum >= 1019 && wordNum <= 2026) {
        folder = "audio-file-2";
    } else if (wordNum >= 2027 && wordNum <= 3034) {
        folder = "audio-file-3";
    } else if (wordNum >= 3035) {
        folder = "audio-file-4";
    }

    const audioPath = `${folder}/${wordText}.mp3`;
    new Audio(audioPath).play().catch(err => console.error("Missing:", audioPath));
}

// ─── NAV ───
function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }
function shuffleCard() { currentIndex = Math.floor(Math.random() * wordData.length); updateCard(); }
function jumpPrompt() {
    const val = prompt("Jump to word #:");
    if (val) { currentIndex = Math.max(0, Math.min(wordData.length - 1, parseInt(val) - 1)); updateCard(); }
}
async function resetDeleted() {
    if (!confirm("Restore all?")) return;
    deletedExamples = [];
    localStorage.removeItem('wf_deleted_log');
    pushDeletedToCloud();
    updateCard();
}
</script>
</body>
</html>
