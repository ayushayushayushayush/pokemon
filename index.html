<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>WordFlow Pro - Long Press Delete</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; 
            --bg: #000000;      
            --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; 
            --text-secondary: #AEAEB2;
            --delete-red: #FF453A;
            --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }

        #loading-screen p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Sync status indicator */
        #sync-status {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: #3a3a3c; color: var(--text-secondary); }
        #sync-status.synced  { background: #1c3a1c; color: #30d158; }
        #sync-status.error   { background: #3a1c1c; color: var(--delete-red); }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .counter { 
            font-size: 0.85rem; 
            font-weight: 700;
            color: var(--text-main); 
            background: #3a3a3c; 
            padding: 4px 12px; 
            border-radius: 20px; 
        }

        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: var(--card-bg); 
            display: flex;
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid #38383a;
        }

        .card-front { 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center; 
            padding: 60px 30px; 
        }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .ipa-sub { 
            font-size: 1.2rem; 
            color: var(--text-secondary); 
            margin-top: 15px; 
            font-family: monospace; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flip-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 15px;
            cursor: pointer;
        }

        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }
        
        .back-header { 
            padding: 30px 30px 15px; 
            border-bottom: 1px solid #38383a;
            flex-shrink: 0;
        }
        
        .back-word {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--delete-red);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meaning-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); line-height: 1.3; margin: 0; }
        
        #example-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px 30px 30px; 
            -webkit-overflow-scrolling: touch;
        }

        .example-item { 
            background: var(--example-bg); 
            padding: 16px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            color: #E5E5EA;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .example-item:active {
            background: #3a3a3c;
        }

        .ex-num {
            color: #FFFFFF;
            font-weight: 800;
            margin-right: 8px;
        }

        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; font-size: 0.9rem; }
        .nav-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="sync-status"></div>

<div id="loading-screen">
    <p>Loading...</p>
</div>

<header id="app-header" style="display:none;">
    <div onclick="resetDeleted()" style="color:var(--delete-red); font-weight:600; font-size:0.8rem;">Restore</div> 
    <div id="counter" class="counter">0 / 0</div>
    <div onclick="jumpPrompt()" style="color:var(--primary); font-weight:600; font-size:0.9rem;">Jump</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudio(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            
            <div class="card-face card-back">
                <div class="back-header" onclick="flipCard()">
                    <p id="b-word" class="back-word">...</p>
                    <p id="b-meaning" class="meaning-text">...</p>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
// ─── JSONBin Config ───────────────────────────────────────────────
const BIN_ID  = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ─── State ────────────────────────────────────────────────────────
let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let syncTimeout = null; // debounce handle

// ─── Sync Status UI ───────────────────────────────────────────────
function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`;
    el.textContent = message;
    clearTimeout(el._hideTimer);
    if (state !== 'syncing') {
        el._hideTimer = setTimeout(() => { el.className = ''; }, 2500);
    }
}

// ─── JSONBin: Fetch deleted list from cloud ───────────────────────
async function fetchDeletedFromCloud() {
    try {
        const res = await fetch(BIN_URL + "/latest", {
            headers: { "X-Master-Key": API_KEY }
        });
        if (!res.ok) throw new Error("Fetch failed");
        const data = await res.json();
        const cloudList = data.record?.deleted || [];
        // Merge cloud + local so nothing is lost
        const merged = Array.from(new Set([...cloudList, ...deletedExamples]));
        deletedExamples = merged;
        localStorage.setItem('wf_deleted_log', JSON.stringify(merged));
        return true;
    } catch (e) {
        console.warn("Could not fetch from JSONBin, using local cache.", e);
        return false;
    }
}

// ─── JSONBin: Push deleted list to cloud (debounced) ─────────────
function pushDeletedToCloud() {
    clearTimeout(syncTimeout);
    showSync('syncing', '↑ Syncing…');
    syncTimeout = setTimeout(async () => {
        try {
            const res = await fetch(BIN_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify({ deleted: deletedExamples })
            });
            if (!res.ok) throw new Error("Push failed");
            showSync('synced', '✓ Synced');
        } catch (e) {
            console.warn("Could not sync to JSONBin.", e);
            showSync('error', '⚠ Sync failed (saved locally)');
        }
    }, 800); // wait 800ms after last delete before pushing
}

// ─── Boot ─────────────────────────────────────────────────────────
window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            // Fetch cloud state before showing the app
            document.getElementById('loading-screen').querySelector('p').textContent = 'Syncing…';
            await fetchDeletedFromCloud();
            startApp();
        }
    });
};

function startApp() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app-header').style.display = 'flex';
    updateCard();
}

// ─── Card Rendering ───────────────────────────────────────────────
function updateCard() {
    if (wordData.length === 0) return;
    const item = wordData[currentIndex];
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);

    document.getElementById('f-word').textContent = item.WORD || "";
    document.getElementById('f-ipa').textContent = item.IPA || "";
    document.getElementById('f-phonetic').textContent = item.PHONETIC || "";
    
    document.getElementById('b-word').textContent = item.WORD || "";
    document.getElementById('b-meaning').textContent = item.MEANING || "";

    const list = document.getElementById('example-list');
    list.innerHTML = "";
    list.scrollTop = 0;

    let exampleCounter = 1;
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${item.WORD}|${text.trim()}`;
            
            if (!deletedExamples.includes(exId)) {
                const exDiv = document.createElement('div');
                exDiv.className = 'example-item';
                exDiv.innerHTML = `<span class="ex-num">${exampleCounter}.</span>${text}`;
                
                // Long press logic
                let pressTimer;
                
                const startPress = () => {
                    pressTimer = setTimeout(() => {
                        if (confirm("Delete this example?")) {
                            deleteExample(exId, exDiv);
                        }
                    }, 700);
                };

                const cancelPress = () => clearTimeout(pressTimer);

                exDiv.addEventListener('mousedown', startPress);
                exDiv.addEventListener('touchstart', startPress, {passive: true});
                exDiv.addEventListener('mouseup', cancelPress);
                exDiv.addEventListener('mouseleave', cancelPress);
                exDiv.addEventListener('touchend', cancelPress);
                exDiv.addEventListener('touchmove', cancelPress);

                list.appendChild(exDiv);
                exampleCounter++;
            }
        }
    }
}

// ─── Delete ───────────────────────────────────────────────────────
function deleteExample(id, element) {
    element.style.opacity = '0';
    element.style.transform = 'scale(0.95)';
    setTimeout(() => {
        deletedExamples.push(id);
        localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
        element.remove();
        pushDeletedToCloud(); // sync to cloud
    }, 200);
}

// ─── Restore ──────────────────────────────────────────────────────
async function resetDeleted() {
    if (confirm("Restore all deleted examples?")) {
        deletedExamples = [];
        localStorage.removeItem('wf_deleted_log');
        showSync('syncing', '↑ Syncing…');
        try {
            const res = await fetch(BIN_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify({ deleted: [] })
            });
            if (!res.ok) throw new Error();
            showSync('synced', '✓ Restored & synced');
        } catch {
            showSync('error', '⚠ Restored locally only');
        }
        updateCard();
    }
}

// ─── Navigation ───────────────────────────────────────────────────
function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }

function shuffleCard() {
    if (wordData.length <= 1) return;
    let newIndex;
    do { newIndex = Math.floor(Math.random() * wordData.length); } while (newIndex === currentIndex);
    currentIndex = newIndex;
    updateCard();
}

function playAudio(e) {
    e.stopPropagation();
    const wordNum = currentIndex + 1;
    let folder = "audio-file";
    if (wordNum >= 1019 && wordNum <= 2026) folder = "audio-file-1";
    else if (wordNum >= 2027 && wordNum <= 3034) folder = "audio-file-3";
    else if (wordNum >= 3035) folder = "audio-file-4";
    new Audio(`${folder}/${wordData[currentIndex].WORD}.mp3`).play().catch(() => {});
}

function jumpPrompt() {
    const val = prompt("Jump to word #:");
    if (val) { currentIndex = Math.max(0, Math.min(wordData.length - 1, parseInt(val) - 1)); updateCard(); }
}
</script>
</body>
</html>
