<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4D9EFF;
            --primary-dim: rgba(77,158,255,0.12);
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --text-dim: #444;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --accent-gold: #FFD60A;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-xl: 32px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Lora', Georgia, serif;
            display: flex; flex-direction: column;
            overflow: hidden; overscroll-behavior-y: none;
        }

        /* ── UI Elements ── */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000;
            display: flex; align-items: center; justify-content: center;
        }
        #loading-screen p { font-family: 'Playfair Display', serif; color: var(--text-secondary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

        #sync-status {
            position: fixed; top: calc(var(--safe-top) + 10px); left: 50%;
            transform: translateX(-50%); font-size: 0.7rem; font-weight: 600;
            padding: 5px 14px; border-radius: 20px; z-index: 4000;
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: var(--surface-4); color: var(--text-secondary); }
        #sync-status.synced { background: rgba(46,204,113,0.15); color: var(--success-green); border: 1px solid rgba(46,204,113,0.3); }

        header { padding: calc(var(--safe-top) + 16px) 20px 12px; display: flex; justify-content: space-between; align-items: center; }
        .header-btn {
            font-family: 'Lora', Georgia, serif; font-weight: 600; font-size: 0.78rem;
            padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer;
            background: var(--surface-3); color: var(--text-main); border: 1px solid var(--border);
        }
        .header-btn:active { background: var(--surface-4); }
        .fav-btn { font-size: 1.15rem; padding: 6px 14px; line-height: 1; }
        .counter {
            font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 700;
            color: var(--text-secondary); background: var(--surface-2);
            padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
        }

        /* ── Overlays ── */
        #fav-overlay, #known-overlay, #settings-overlay, #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        .list-container { flex: 1; overflow-y: auto; padding: 8px 18px 24px; -webkit-overflow-scrolling: touch; }

        /* ── Card Styles ── */
        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 18px; }
        
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card:active { transform: scale(0.98); }
        .card.is-flipped { transform: rotateY(180deg); }
        .card.is-flipped:active { transform: rotateY(180deg) scale(0.98); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: var(--radius-xl); background: var(--surface-1);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border-bright);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .card-front { justify-content: center; align-items: center; text-align: center; padding: 40px 30px; }
        .word-display { font-family: 'Playfair Display', serif; font-size: 3.4rem; font-weight: 800; margin: 0; }
        .ipa-sub { font-size: 1rem; color: var(--text-secondary); margin-top: 14px; font-family: monospace; }
        
        .mastery-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; }
        .mastery-btn.known {
            background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3);
            color: var(--success-green); padding: 12px 24px; border-radius: 50px;
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        }

        .card-back { transform: rotateY(180deg); }
        .back-header { padding: 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .back-top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .back-word { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 800; color: var(--delete-red); text-transform: uppercase; margin: 0; }
        .meaning-text { font-size: 1.1rem; font-weight: 500; line-height: 1.4; margin: 0; }

        .example-item {
            background: var(--surface-2); padding: 14px 16px; font-size: 0.95rem; line-height: 1.5;
            color: #ccc; margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border);
        }

        /* ── Controls ── */
        .controls { padding: 16px 18px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn {
            flex: 1; height: 58px; border-radius: var(--radius-md); border: 1px solid var(--border);
            background: var(--surface-3); color: #fff; font-weight: 700;
        }
        .nav-btn.primary { background: var(--primary); box-shadow: 0 4px 15px rgba(77,158,255,0.3); border: none; }

        /* ── Favorites/Quiz Styles ── */
        .fav-group-header { margin: 20px 0 8px; display: flex; align-items: baseline; gap: 8px; }
        .fav-group-title { font-family: 'Playfair Display', serif; color: var(--delete-red); font-size: 1rem; font-weight: 800; text-transform: uppercase; }
        .quiz-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        .quiz-sentence { font-size: 1.15rem; background: var(--surface-2); padding: 20px; border-radius: 16px; line-height: 1.6; min-height: 120px; }
        .quiz-sentence b { color: var(--primary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn { background: var(--surface-2); padding: 15px; border-radius: 12px; text-align: center; font-weight: 600; border: 1px solid var(--border); }
        .option-btn.correct { background: rgba(46,204,113,0.2); border-color: var(--success-green); color: var(--success-green); }
        .option-btn.wrong { background: rgba(255,69,69,0.2); border-color: var(--delete-red); color: var(--delete-red); }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>LOADING DATABASE...</p></div>

<div id="settings-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Settings</div>
        <div style="width: 60px;"></div>
    </header>
    <div class="list-container">
        <div onclick="openKnown()" class="example-item" style="display:flex; justify-content:space-between;"><span>Mastered Words</span> <span>›</span></div>
        <div onclick="resetDeleted()" class="example-item" style="color:var(--delete-red);">Restore Deleted Examples</div>
    </div>
</div>

<div id="fav-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Favorites</div>
        <div class="header-btn fav-btn" onclick="startQuiz(event)">💡</div>
    </header>
    <div id="fav-list" class="list-container"></div>
</div>

<div id="known-overlay">
    <header>
        <div onclick="openSettings()" class="header-btn" style="color:var(--primary);">← Settings</div>
        <div style="font-weight:800;">Mastered</div>
        <div style="width: 60px;"></div>
    </header>
    <div id="known-list" class="list-container"></div>
</div>

<div id="quiz-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Quiz</div>
        <div style="width:60px;"></div>
    </header>
    <div class="quiz-container">
        <div id="quiz-question" class="quiz-sentence"></div>
        <div id="quiz-options" class="options-grid"></div>
    </div>
</div>

<header id="app-header" style="display:none;">
    <div class="header-btn" onclick="openSettings()">⚙️</div>
    <div class="header-btn fav-btn" onclick="openFavs()">★</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudioFromEvent(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div id="f-ipa" class="ipa-sub"></div>
                </div>
                <div class="mastery-controls">
                    <div class="mastery-btn known" onclick="markAsKnown(event)">✓ Mastered</div>
                </div>
            </div>
            
            <div class="card-face card-back">
                <div class="back-header">
                    <div class="back-top-row">
                        <p id="b-word" class="back-word" onclick="playAudioFromEvent(event)">...</p>
                        <div id="more-btn" class="more-btn header-btn" onclick="handleMoreClick(event)">More</div>
                    </div>
                    <p id="b-meaning" class="meaning-text">...</p>
                </div>
                <div id="example-list" class="list-container"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const BIN_ID = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let favExamples = JSON.parse(localStorage.getItem('wf_fav_log') || "[]");
let knownWords = JSON.parse(localStorage.getItem('wf_known_words') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let availableMeanings = [];
let currentMeaningIdx = 0;
let quizPool = [];
let currentQuizCorrect = "";

window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            fetch(BIN_URL + "/latest", { headers: { "X-Master-Key": API_KEY } })
                .then(r => r.json())
                .then(d => {
                    deletedExamples = Array.from(new Set([...(d.record?.deleted || []), ...deletedExamples]));
                    favExamples = Array.from(new Set([...(d.record?.favs || []), ...favExamples]));
                    knownWords = Array.from(new Set([...(d.record?.known || []), ...knownWords]));
                    saveAndSync(false);
                }).catch(() => {});
            
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            updateCard();
        }
    });
};

function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

function updateCard() {
    const item = wordData[currentIndex];
    availableMeanings = [item.MEANING];
    for(let i=1; i<=10; i++) if(item[`Meaning${i}`]) availableMeanings.push(item[`Meaning${i}`]);
    availableMeanings = availableMeanings.filter(m => m && m.trim());
    
    currentMeaningIdx = 0;
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);
    
    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA || item.PHONETIC || '';
    document.getElementById('b-word').textContent = item.WORD;
    document.getElementById('b-meaning').textContent = availableMeanings[0] || '';
    
    const moreBtn = document.getElementById('more-btn');
    moreBtn.style.display = availableMeanings.length > 1 ? 'block' : 'none';
    moreBtn.textContent = `More 1/${availableMeanings.length}`;
    
    renderExamples(item);
}

function renderExamples(item) {
    const list = document.getElementById('example-list');
    list.innerHTML = "";
    const word = item.WORD.trim();
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${word}|${text.trim()}`;
            if (deletedExamples.includes(exId)) continue;
            
            const div = document.createElement('div');
            div.className = 'example-item';
            if (favExamples.includes(exId)) div.style.color = 'var(--delete-red)';
            div.innerHTML = text.trim();
            
            let pressTimer;
            div.ontouchstart = (e) => {
                const startX = e.touches[0].clientX;
                pressTimer = setTimeout(() => {
                    if (startX > window.innerWidth / 2) {
                        if (favExamples.includes(exId)) favExamples = favExamples.filter(x => x !== exId);
                        else favExamples.push(exId);
                        div.style.color = favExamples.includes(exId) ? 'var(--delete-red)' : '';
                    } else {
                        deletedExamples.push(exId);
                        div.remove();
                    }
                    saveAndSync();
                }, 600);
            };
            div.ontouchend = () => clearTimeout(pressTimer);
            div.onclick = (e) => e.stopPropagation();
            list.appendChild(div);
        }
    }
}

function renderFavList() {
    const list = document.getElementById('fav-list');
    list.innerHTML = "";
    if (favExamples.length === 0) { list.innerHTML = "<p style='text-align:center; color:var(--text-dim);'>No favorites yet.</p>"; return; }
    
    const groups = {};
    favExamples.forEach(exId => {
        const [w, txt] = exId.split('|');
        if (!groups[w]) groups[w] = [];
        groups[w].push(txt);
    });

    Object.keys(groups).sort().forEach(w => {
        const header = document.createElement('div');
        header.className = 'fav-group-header';
        header.innerHTML = `<span class="fav-group-title">${w}</span>`;
        list.appendChild(header);
        
        groups[w].forEach(txt => {
            const item = document.createElement('div');
            item.className = 'example-item';
            item.textContent = txt;
            list.appendChild(item);
        });
    });
}

function startQuiz(e) {
    if(e) e.stopPropagation();
    if(favExamples.length < 4) { alert("Need at least 4 favorites to quiz!"); return; }
    quizPool = [...favExamples];
    document.getElementById('fav-overlay').style.display = 'none';
    document.getElementById('quiz-overlay').style.display = 'flex';
    nextQuizQuestion();
}

function nextQuizQuestion() {
    if(quizPool.length === 0) { alert("Quiz Finished!"); closeOverlays(); return; }
    const idx = Math.floor(Math.random() * quizPool.length);
    const [word, sentence] = quizPool.splice(idx, 1)[0].split('|');
    currentQuizCorrect = word;
    
    const masked = sentence.replace(new RegExp(word, 'gi'), "<b>_______</b>");
    document.getElementById('quiz-question').innerHTML = masked;
    
    let options = [word];
    while(options.length < 4) {
        const rw = wordData[Math.floor(Math.random() * wordData.length)].WORD;
        if(!options.includes(rw)) options.push(rw);
    }
    options.sort(() => Math.random() - 0.5);
    
    const grid = document.getElementById('quiz-options');
    grid.innerHTML = "";
    options.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => {
            if(opt === currentQuizCorrect) {
                btn.classList.add('correct');
                setTimeout(nextQuizQuestion, 800);
            } else {
                btn.classList.add('wrong');
            }
        };
        grid.appendChild(btn);
    });
}

function jumpPrompt() {
    const val = prompt("Jump to word #:", currentIndex + 1);
    if(val) {
        const n = parseInt(val) - 1;
        if(n >= 0 && n < wordData.length) { currentIndex = n; updateCard(); }
    }
}

function markAsKnown(e) {
    if(e) e.stopPropagation();
    const w = wordData[currentIndex].WORD.trim();
    if(!knownWords.includes(w)) { knownWords.push(w); saveAndSync(); nextCard(); }
}

function openKnown() {
    document.getElementById('known-overlay').style.display = 'flex';
    const list = document.getElementById('known-list');
    list.innerHTML = knownWords.map(w => `<div class="example-item">${w}</div>`).join('');
}

function resetDeleted() { if(confirm("Restore all deleted examples?")) { deletedExamples = []; saveAndSync(); alert("Restored!"); } }

function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }
function shuffleCard() { currentIndex = Math.floor(Math.random() * wordData.length); updateCard(); }

function openSettings() { document.getElementById('settings-overlay').style.display = 'flex'; }
function openFavs() { document.getElementById('fav-overlay').style.display = 'flex'; renderFavList(); }
function closeOverlays() { document.querySelectorAll('#fav-overlay, #known-overlay, #settings-overlay, #quiz-overlay').forEach(el => el.style.display = 'none'); }

function handleMoreClick(e) {
    if(e) e.stopPropagation();
    currentMeaningIdx = (currentMeaningIdx + 1) % availableMeanings.length;
    document.getElementById('b-meaning').textContent = availableMeanings[currentMeaningIdx];
    document.getElementById('more-btn').textContent = `More ${currentMeaningIdx + 1}/${availableMeanings.length}`;
}

function playAudioFromEvent(e) {
    if(e) e.stopPropagation();
    const w = wordData[currentIndex].WORD;
    const a = new Audio(`audio-file/${w}.mp3`);
    a.play().catch(() => {
        const m = new SpeechSynthesisUtterance(w);
        window.speechSynthesis.speak(m);
    });
}

function saveAndSync(push = true) {
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
    localStorage.setItem('wf_known_words', JSON.stringify(knownWords));
    if(push) {
        const status = document.getElementById('sync-status');
        status.className = 'show syncing';
        status.textContent = 'Syncing...';
        fetch(BIN_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify({ deleted: deletedExamples, favs: favExamples, known: knownWords })
        }).then(() => {
            status.className = 'show synced';
            status.textContent = 'Synced';
            setTimeout(() => status.className = '', 1500);
        });
    }
}
</script>
</body>
</html>
