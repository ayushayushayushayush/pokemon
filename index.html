<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>Flashcards Pro</title>

    <style>
        :root {
            --primary: #007AFF; /* iOS Blue */
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: env(safe-area-inset-top);
        }

        /* Flashcard Container */
        .scene {
            width: 90%;
            max-width: 400px;
            height: 65vh;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
        }

        /* FRONT */
        .card-front {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .word-display { font-size: 3.2rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -1px; }
        .type-display { font-size: 1.1rem; color: var(--primary); font-weight: 600; margin-top: 5px; text-transform: uppercase; }

        /* BACK */
        .card-back {
            transform: rotateY(180deg);
            padding: 25px;
        }

        .scroll-area {
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            padding-right: 8px;
        }

        .meaning-header { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .phonetic-sub { font-family: monospace; color: var(--text-secondary); margin-bottom: 20px; font-size: 1rem; }
        
        .examples-label { 
            font-size: 0.8rem; 
            font-weight: 800; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            margin-bottom: 12px;
            display: block;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .example-item {
            background: #f8f9ff;
            padding: 14px;
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #3a3a3c;
        }

        /* Controls */
        .controls {
            padding: 30px 0 calc(30px + env(safe-area-inset-bottom));
            display: flex;
            gap: 15px;
        }

        button {
            padding: 16px 32px;
            border-radius: 18px;
            border: none;
            background: #ffffff;
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button.primary-btn { background: var(--primary); color: white; }
        button:active { transform: scale(0.96); opacity: 0.8; }

        /* Scrollbar */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="scene">
        <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="type-display" id="f-type"></div>
                <h1 id="f-word" class="word-display"></h1>
                <p style="color: #c7c7cc; font-size: 0.8rem; margin-top: 20px;">Tap to Flip</p>
            </div>

            <div class="card-face card-back">
                <div class="scroll-area">
                    <div class="meaning-header" id="b-meaning"></div>
                    <div class="phonetic-sub">
                        <span id="b-ipa"></span> • <span id="b-phonetic"></span>
                    </div>
                    
                    <span class="examples-label">Usage Examples</span>
                    <div id="example-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">Previous</button>
        <button class="primary-btn" onclick="nextCard(event)">Next Word</button>
    </div>
</div>

<script>
    // Example of how your CSV data should be structured in the array
    const wordData = [
        { 
            word: "abase", 
            type: "V.", 
            meaning: "lower; humiliate", 
            ipa: "əˈbeɪs", 
            phonetic: "uh-BEYS",
            // You can add up to 50 example fields here
            example1: "He was unwilling to abase himself by pleading for mercy.",
            example2: "The boss's goal was to abase his employees.",
            example3: "The king was forced to abase himself before the conqueror.",
            example4: "Do not abase yourself by engaging in such petty behavior."
        },
        { 
            word: "abash", 
            type: "V.", 
            meaning: "to make ashamed or uneasy; disconcert", 
            ipa: "əˈbæʃ", 
            phonetic: "uh-BASH",
            example1: "The student was abashed by the teacher's public correction.",
            example2: "Nothing could abash the confident young performer."
        }
    ];

    let currentIndex = 0;

    function renderCard() {
        const item = wordData[currentIndex];
        const card = document.getElementById('card');
        
        // Reset rotation for new word
        card.classList.remove('is-flipped');

        setTimeout(() => {
            // Front Content
            document.getElementById('f-word').textContent = item.word;
            document.getElementById('f-type').textContent = item.type;

            // Back Content
            document.getElementById('b-meaning').textContent = item.meaning;
            document.getElementById('b-ipa').textContent = item.ipa;
            document.getElementById('b-phonetic').textContent = item.phonetic;

            // DYNAMIC EXAMPLE LOADER
            const container = document.getElementById('example-container');
            container.innerHTML = "";
            
            // This loop checks every property in the object
            // If the property name contains 'example' and has text, it creates a box
            Object.keys(item).forEach(key => {
                if (key.toLowerCase().includes('example') && item[key]) {
                    const div = document.createElement('div');
                    div.className = 'example-item';
                    div.textContent = item[key];
                    container.appendChild(div);
                }
            });
        }, 150);
    }

    function nextCard(e) {
        e.stopPropagation();
        currentIndex = (currentIndex + 1) % wordData.length;
        renderCard();
    }

    function prevCard(e) {
        e.stopPropagation();
        currentIndex = (currentIndex - 1 + wordData.length) % wordData.length;
        renderCard();
    }

    // Load initial card
    renderCard();
</script>

</body>
</html>
