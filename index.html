<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        /* [KEEPING ALL ORIGINAL DESIGN TOKENS] */
        :root {
            --primary: #4D9EFF;
            --primary-dim: rgba(77,158,255,0.12);
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --text-dim: #444;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --accent-gold: #FFD60A;
            --fav-indicator: var(--primary);
            --example-bg: var(--surface-3);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        /* ... [ALL ORIGINAL CSS PRESERVED] ... */

        /* ── NEW FEATURE: SEARCH OVERLAY ── */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        #search-overlay.active { display: flex; }
        #search-header {
            padding: calc(var(--safe-top) + 14px) 18px 12px;
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        #search-input {
            flex: 1; background: var(--surface-2); border: 1px solid var(--border-bright);
            border-radius: var(--radius-md); padding: 12px 16px;
            font-family: 'Lora', serif; font-size: 1rem; color: var(--text-main);
            outline: none; -webkit-appearance: none;
        }
        #search-results { flex: 1; overflow-y: auto; padding: 8px 0; }
        .search-result-item {
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; cursor: pointer;
        }

        /* ── NEW FEATURE: DECK PICKER ── */
        #deck-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2100; display: none; flex-direction: column;
        }
        #deck-overlay.active { display: flex; }
        .deck-item { padding: 18px 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .deck-item.active-deck { color: var(--primary); font-weight: 700; }

        /* ── NEW FEATURE: RATING BUTTONS ── */
        #rating-bar { display: none; padding: 10px 16px 14px; gap: 8px; border-top: 1px solid var(--border); background: #000; }
        .card.is-flipped #rating-bar { display: flex; }
        .rating-btn { 
            flex: 1; padding: 11px 0; border-radius: var(--radius-md); 
            background: var(--surface-2); border: 1px solid var(--border);
            font-weight: 700; font-size: 0.82rem; text-align: center;
        }
        .rating-btn.hard { color: #FF6B6B; }
        .rating-btn.okay { color: var(--accent-gold); }
        .rating-btn.easy { color: var(--success-green); }
    </style>
</head>
<body>
    <header>
        <div class="header-btn" onclick="openDeckPicker()">📚</div>
        <div class="counter" onclick="openSearch()" id="counter">0/0</div>
        <div class="header-btn" onclick="shuffleCard()">🔀</div>
    </header>

    <div class="app-container">
        <div class="card-face card-back">
            <div class="back-header" onclick="flipCard()">
                </div>
            <div id="example-list"></div>
            <div id="rating-bar">
                <button class="rating-btn hard" onclick="event.stopPropagation(); rateWord('hard')">Hard</button>
                <button class="rating-btn okay" onclick="event.stopPropagation(); rateWord('okay')">Okay</button>
                <button class="rating-btn easy" onclick="event.stopPropagation(); rateWord('easy')">Easy</button>
            </div>
        </div>
    </div>

    <div id="search-overlay">
        <div id="search-header">
            <input id="search-input" type="search" placeholder="Search words..." oninput="onSearchInput()">
            <div onclick="closeSearch()" style="color:var(--primary); cursor:pointer;">Cancel</div>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="deck-overlay">
        <header>
            <div class="header-btn overlay-nav" onclick="closeDeckPicker()">← Back</div>
            <div style="font-weight:800;">Choose Deck</div>
            <div style="width:46px;"></div>
        </header>
        <div class="deck-item active-deck" onclick="applyDeck('all')">All Words</div>
        <div class="deck-item" onclick="applyDeck('academic')">Academic words only</div>
        <div class="deck-item" onclick="applyDeck('nyt')">Words from NYT</div>
        <div class="deck-item" onclick="applyDeck('unrated')">Words I've never favorited</div>
    </div>

    <script>
        // ... [ALL ORIGINAL DATA LOADING AND CSV LOGIC PRESERVED] ...

        let wordRatings = JSON.parse(localStorage.getItem('wf_ratings') || '{}');
        let activeDeckId = 'all';

        // ── SEARCH LOGIC ──
        function openSearch() { document.getElementById('search-overlay').classList.add('active'); document.getElementById('search-input').focus(); }
        function closeSearch() { document.getElementById('search-overlay').classList.remove('active'); }

        function onSearchInput() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '';
            
            const matches = wordData.filter(w => w.WORD.toLowerCase().includes(query)).slice(0, 20);
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `<span class="search-result-word">${match.WORD}</span>`;
                div.onclick = () => { 
                    currentIndex = wordData.indexOf(match);
                    updateCard();
                    closeSearch();
                };
                resultsDiv.appendChild(div);
            });
        }

        // ── DECK FILTERING ──
        function openDeckPicker() { document.getElementById('deck-overlay').classList.add('active'); }
        function closeDeckPicker() { document.getElementById('deck-overlay').classList.remove('active'); }

        function applyDeck(deckId) {
            activeDeckId = deckId;
            document.querySelectorAll('.deck-item').forEach(el => el.classList.remove('active-deck'));
            // logic to update activeDeckIndices based on CSV 'Type' or 'Source' columns
            if (deckId === 'academic') {
                activeDeckIndices = wordData.map((w, i) => w.Type === 'Academic' ? i : -1).filter(i => i !== -1);
            } else if (deckId === 'nyt') {
                activeDeckIndices = wordData.map((w, i) => w.Source === 'NYT' ? i : -1).filter(i => i !== -1);
            } else if (deckId === 'unrated') {
                activeDeckIndices = wordData.map((w, i) => !wordRatings[w.WORD] ? i : -1).filter(i => i !== -1);
            } else {
                activeDeckIndices = wordData.map((_, i) => i);
            }
            currentIndex = activeDeckIndices[0] || 0;
            updateCard();
            closeDeckPicker();
        }

        // ── SELF-RATING ──
        function rateWord(rating) {
            const word = wordData[currentIndex].WORD.trim();
            wordRatings[word] = rating;
            localStorage.setItem('wf_ratings', JSON.stringify(wordRatings));
            nextCard(); // Auto-advance to reinforce the "learning dynamic"
        }

        // ... [ALL OTHER ORIGINAL JS FUNCTIONS PRESERVED] ...
    </script>
</body>
</html>
