<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    
    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; 
            --bg: #000000;      
            --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; 
            --text-secondary: #AEAEB2;
            --delete-red: #FF453A;
            --fav-indicator: #2C2C2E; 
            --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 3000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }

        #sync-status {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 4000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: #3a3a3c; color: var(--text-secondary); }
        #sync-status.synced  { background: #1c3a1c; color: #30d158; }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }

        .header-btn {
            font-weight: 600;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .fav-btn {
            background: #2C2C2E;
            color: var(--text-main);
            border: 1px solid #3a3a3c;
            font-size: 1.2rem;
            padding: 4px 14px;
            line-height: 1;
        }

        .counter { 
            font-size: 0.85rem; 
            font-weight: 700;
            color: var(--text-main); 
            background: #3a3a3c; 
            padding: 6px 14px; 
            border-radius: 20px;
        }

        #fav-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        #fav-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .fav-group-header {
            margin: 20px 0 12px 5px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .fav-group-title {
            color: var(--delete-red); 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .fav-group-ipa {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: var(--card-bg); 
            display: flex;
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid #38383a;
        }

        .card-front { 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center; 
            padding: 60px 30px; 
        }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .ipa-sub { 
            font-size: 1.2rem; 
            color: var(--text-secondary); 
            margin-top: 15px; 
            font-family: monospace; 
            display: flex; flex-direction: column; gap: 8px;
        }

        .flip-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1.15rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 20px;
        }

        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }
        
        .back-header { 
            padding: 25px 25px 15px; 
            border-bottom: 1px solid #38383a;
            flex-shrink: 0;
        }

        .back-top-row {
            display: flex; align-items: center; justify-content: flex-start; gap: 12px; margin-bottom: 12px;
        }
        
        .back-word {
            font-size: 1.2rem; font-weight: 800; color: var(--delete-red); text-transform: uppercase; letter-spacing: 0.5px; margin: 0;
        }

        .more-btn {
            background: var(--primary); color: white; font-size: 0.65rem; font-weight: 800; padding: 6px 12px; border-radius: 12px; text-transform: uppercase; white-space: nowrap;
        }

        .meaning-container { min-height: 60px; }
        .meaning-text { 
            font-size: 1.2rem; font-weight: 700; color: var(--text-main); line-height: 1.4; margin: 0; transition: opacity 0.1s; overflow-wrap: break-word;
        }
        
        #example-list { 
            flex-grow: 1; overflow-y: auto; padding: 15px 25px 30px; -webkit-overflow-scrolling: touch;
        }

        .example-item { 
            background: var(--example-bg); padding: 16px; font-size: 0.95rem; line-height: 1.5; color: #E5E5EA; margin-bottom: 12px; border-radius: 12px; transition: opacity 0.3s; -webkit-user-select: none;
        }

        #example-list .example-item.is-fav { 
            font-weight: 800; 
            border-left: 4px solid var(--fav-indicator); 
        }

        #fav-list .example-item.is-fav { 
            font-weight: 400; 
            border-left: 4px solid var(--fav-indicator); 
        }

        .ex-num { color: #FFFFFF; font-weight: 800; margin-right: 8px; }

        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; font-size: 0.9rem; }
        .nav-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>Loading...</p></div>

<div id="fav-overlay">
    <header>
        <div onclick="closeFavs()" class="header-btn" style="color:var(--primary); font-size: 0.9rem; padding-left: 0;">← Back</div>
        <div style="font-weight:800; font-size:1rem;">Favorites</div>
        <div style="width:60px;"></div>
    </header>
    <div id="fav-list"></div>
</div>

<header id="app-header" style="display:none;">
    <div onclick="resetDeleted()" class="header-btn" style="color:var(--delete-red); padding-left: 0;">Restore</div> 
    <div class="header-btn fav-btn" onclick="openFavs()">★</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudioFromEvent(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            
            <div class="card-face card-back">
                <div class="back-header">
                    <div class="back-top-row">
                        <p id="b-word" class="back-word" onclick="flipCard()">...</p>
                        <div id="more-btn" class="more-btn" onclick="handleMoreClick(event)">More</div>
                    </div>
                    <div class="meaning-container" onclick="flipCard()">
                        <p id="b-meaning" class="meaning-text">...</p>
                    </div>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const BIN_ID  = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let favExamples = JSON.parse(localStorage.getItem('wf_fav_log') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let availableMeanings = [];
let currentMeaningIdx = 0;
let syncTimeout = null;
let isTransitioning = false;

function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`;
    el.textContent = message;
    setTimeout(() => { el.className = ''; }, 2000);
}

window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            
            fetch(BIN_URL + "/latest", { headers: { "X-Master-Key": API_KEY } })
                .then(r => r.json())
                .then(d => {
                    deletedExamples = Array.from(new Set([...(d.record?.deleted || []), ...deletedExamples]));
                    favExamples = Array.from(new Set([...(d.record?.favs || []), ...favExamples]));
                    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
                    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
                }).catch(() => {});

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            updateCard();
        }
    });
};

function updateCard() {
    const item = wordData[currentIndex];
    isTransitioning = false;
    const meaningEl = document.getElementById('b-meaning');
    meaningEl.innerText = ""; 
    
    availableMeanings = [];
    if (item.MEANING && item.MEANING.trim()) availableMeanings.push(item.MEANING.trim());
    for(let i=1; i<=10; i++) {
        let val = item[`Meaning${i}`];
        if(val && val.trim()) availableMeanings.push(val.trim());
    }
    currentMeaningIdx = 0;

    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);

    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA;
    document.getElementById('f-phonetic').textContent = item.PHONETIC;
    document.getElementById('b-word').textContent = item.WORD;
    
    meaningEl.innerText = availableMeanings[0] || "";
    meaningEl.style.opacity = 1;
    
    const moreBtn = document.getElementById('more-btn');
    if (availableMeanings.length > 1) {
        moreBtn.style.display = 'block';
        moreBtn.textContent = `More 1/${availableMeanings.length}`;
    } else {
        moreBtn.style.display = 'none';
    }

    renderExamples(item);
}

function handleMoreClick(e) {
    if (e) e.stopPropagation();
    if (availableMeanings.length <= 1 || isTransitioning) return;
    isTransitioning = true;
    const meaningEl = document.getElementById('b-meaning');
    const moreBtn = document.getElementById('more-btn');
    meaningEl.style.opacity = 0;
    setTimeout(() => {
        meaningEl.innerText = ""; 
        currentMeaningIdx = (currentMeaningIdx + 1) % availableMeanings.length;
        meaningEl.innerText = availableMeanings[currentMeaningIdx];
        moreBtn.textContent = `More ${currentMeaningIdx + 1}/${availableMeanings.length}`;
        meaningEl.style.opacity = 1;
        setTimeout(() => isTransitioning = false, 50);
    }, 120); 
}

function renderExamples(item) {
    const list = document.getElementById('example-list');
    list.innerHTML = "";
    
    const favorites = [];
    const others = [];

    // Filter and collect examples first
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${item.WORD}|${text.trim()}`;
            if (deletedExamples.includes(exId)) continue;

            const isFav = favExamples.includes(exId);
            if (isFav) {
                favorites.push({ text: text.trim(), id: exId, isFav: true });
            } else {
                others.push({ text: text.trim(), id: exId, isFav: false });
            }
        }
    }

    // Combine sorted list
    const sortedList = [...favorites, ...others];

    sortedList.forEach((exObj, index) => {
        const exDiv = document.createElement('div');
        exDiv.className = `example-item ${exObj.isFav ? 'is-fav' : ''}`;
        exDiv.innerHTML = `<span class="ex-num">${index + 1}.</span>${exObj.text}`;
        
        let lastTap = 0;
        exDiv.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            if (currentTime - lastTap < 300) { 
                toggleFav(exObj.id, exDiv); 
                e.preventDefault(); 
            }
            lastTap = currentTime;
        });

        let pressTimer;
        exDiv.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => { if (confirm("Delete?")) deleteEx(exObj.id, exDiv); }, 750);
        }, {passive: true});
        exDiv.addEventListener('touchend', () => clearTimeout(pressTimer));

        list.appendChild(exDiv);
    });
}

function openFavs() {
    const overlay = document.getElementById('fav-overlay');
    const list = document.getElementById('fav-list');
    list.innerHTML = "";
    overlay.style.display = 'flex';

    if (favExamples.length === 0) {
        list.innerHTML = `<p style="text-align:center; color:var(--text-secondary); margin-top:50px;">No favorites yet.</p>`;
        return;
    }

    const organized = {};
    favExamples.forEach(id => {
        const [word, text] = id.split('|');
        if (!organized[word]) {
            const masterEntry = wordData.find(w => w.WORD.toLowerCase() === word.toLowerCase());
            organized[word] = {
                index: wordData.indexOf(masterEntry),
                ipa: masterEntry ? masterEntry.IPA : '',
                items: []
            };
        }
        organized[word].items.push({id, text});
    });

    Object.keys(organized).forEach(word => {
        const header = document.createElement('div');
        header.className = 'fav-group-header';

        const title = document.createElement('div');
        title.className = 'fav-group-title';
        title.textContent = word;
        title.onclick = (e) => { e.stopPropagation(); playAudioByIndex(organized[word].index); };

        const ipaSpan = document.createElement('div');
        ipaSpan.className = 'fav-group-ipa';
        ipaSpan.textContent = organized[word].ipa;
        ipaSpan.onclick = (e) => { e.stopPropagation(); playAudioByIndex(organized[word].index); };

        header.appendChild(title);
        header.appendChild(ipaSpan);
        list.appendChild(header);

        organized[word].items.forEach(itemObj => {
            const item = document.createElement('div');
            item.className = 'example-item is-fav';
            item.textContent = itemObj.text;
            
            let favPressTimer;
            item.addEventListener('touchstart', () => {
                favPressTimer = setTimeout(() => {
                    if (confirm("Remove from favorites?")) {
                        favExamples = favExamples.filter(x => x !== itemObj.id);
                        localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
                        pushSync();
                        item.remove();
                    }
                }, 750);
            }, {passive: true});
            item.addEventListener('touchend', () => clearTimeout(favPressTimer));

            list.appendChild(item);
        });
    });
}

function closeFavs() { document.getElementById('fav-overlay').style.display = 'none'; updateCard(); }

function toggleFav(id, el) {
    if (favExamples.includes(id)) {
        favExamples = favExamples.filter(x => x !== id);
        el.classList.remove('is-fav');
    } else {
        favExamples.push(id);
        el.classList.add('is-fav');
    }
    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
    pushSync();
    
    // Refresh to re-sort if we are on the card back
    const item = wordData[currentIndex];
    renderExamples(item);
}

function deleteEx(id, el) {
    deletedExamples.push(id);
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    el.remove();
    pushSync();
}

async function pushSync() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(async () => {
        showSync('syncing', 'Syncing...');
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ deleted: deletedExamples, favs: favExamples })
            });
            showSync('synced', 'Synced');
        } catch { }
    }, 1000);
}

function playAudioFromEvent(e) {
    e.stopPropagation();
    playAudioByIndex(currentIndex);
}

function playAudioByIndex(idx) {
    if (idx < 0 || idx >= wordData.length) return;
    const wordNum = idx + 1;
    const wordText = wordData[idx].WORD;
    let folder = "audio-file";
    if (wordNum >= 1019 && wordNum <= 2026) folder = "audio-file-2";
    else if (wordNum >= 2027 && wordNum <= 3034) folder = "audio-file-3";
    else if (wordNum >= 3035) folder = "audio-file-4";
    new Audio(`${folder}/${wordText}.mp3`).play().catch(() => {});
}

function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }
function shuffleCard() { currentIndex = Math.floor(Math.random() * wordData.length); updateCard(); }
function jumpPrompt() {
    const val = prompt(`Jump to #:`);
    if (val) {
        const num = parseInt(val);
        if (!isNaN(num)) { currentIndex = Math.max(0, Math.min(wordData.length - 1, num - 1)); updateCard(); }
    }
}
function resetDeleted() {
    if (confirm("Restore all?")) {
        deletedExamples = []; favExamples = [];
        localStorage.removeItem('wf_deleted_log'); localStorage.removeItem('wf_fav_log');
        updateCard(); pushSync();
    }
}
</script>
</body>
</html>
