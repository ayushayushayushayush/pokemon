<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; --bg: #000000; --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; --text-secondary: #AEAEB2;
            --delete-red: #FF453A; --success-green: #30D158;
            --fav-indicator: #0A84FF; --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
            overscroll-behavior-y: none;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #sync-status {
            position: fixed; top: calc(var(--safe-top) + 8px); left: 50%;
            transform: translateX(-50%); font-size: 0.75rem; font-weight: 600;
            padding: 4px 12px; border-radius: 20px; z-index: 4000;
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: #3a3a3c; color: var(--text-secondary); }
        #sync-status.synced  { background: #1c3a1c; color: var(--success-green); }

        header { padding: calc(var(--safe-top) + 15px) 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-btn { font-weight: 600; font-size: 0.8rem; padding: 6px 12px; border-radius: 12px; background: #2C2C2E; color: var(--text-main); border: 1px solid #3a3a3c; }
        .fav-btn { font-size: 1.2rem; padding: 4px 14px; }
        .counter { font-size: 0.85rem; font-weight: 700; background: #3a3a3c; padding: 6px 14px; border-radius: 20px; }

        #fav-overlay, #known-overlay, #settings-overlay, #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }

        .list-container { flex: 1; overflow-y: auto; padding: 10px 20px 20px; -webkit-overflow-scrolling: touch; }
        .settings-item { background: var(--card-bg); padding: 18px; margin-bottom: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }

        /* Quiz UI Restoration */
        .quiz-container { padding: 15px; display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; }
        .quiz-header-info { display: flex; justify-content: space-between; align-items: center; background: #1C1C1E; padding: 12px 18px; border-radius: 15px; border: 1px solid #38383a; }
        .quiz-stat { display: flex; flex-direction: column; align-items: center; }
        .quiz-stat-val { font-size: 1rem; font-weight: 800; }
        .quiz-stat-label { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; }

        .quiz-sentence { font-size: 1.15rem; line-height: 1.6; background: var(--card-bg); padding: 25px 20px; border-radius: 20px; border: 1px solid #38383a; min-height: 140px; }
        .quiz-sentence b { color: var(--primary); font-weight: 800; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 20px; }
        .option-btn { background: #2C2C2E; color: white; border: 1px solid #3a3a3c; padding: 16px 8px; border-radius: 12px; font-weight: 600; text-align: center; }
        .option-btn.correct { background: var(--success-green); color: black; }
        .option-btn.wrong { background: var(--delete-red); }

        /* Flashcard Scene */
        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 35px; background: var(--card-bg); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #38383a; }
        
        .card-front { justify-content: flex-start; align-items: center; text-align: center; padding: 60px 30px; }
        .word-display { font-size: 3.5rem; font-weight: 800; margin: 0; }
        .ipa-sub { font-size: 1.2rem; color: var(--text-secondary); margin-top: 15px; font-family: monospace; display: flex; flex-direction: column; gap: 8px; }

        .mastery-controls { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .card.is-flipped .mastery-controls { opacity: 0; pointer-events: none; }
        .mastery-btn { background: #2C2C2E; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border: 1px solid #3a3a3c; }

        .card-back { transform: rotateY(180deg); }
        .back-header { padding: 25px; border-bottom: 1px solid #38383a; position: relative; }
        .back-word { font-size: 1.6rem; font-weight: 800; color: var(--delete-red); margin: 0; }
        .more-btn { background: var(--primary); color: white; font-size: 0.65rem; font-weight: 800; padding: 6px 12px; border-radius: 12px; position: absolute; right: 25px; top: 25px; }

        #example-list { flex-grow: 1; overflow-y: auto; padding: 15px 25px; -webkit-overflow-scrolling: touch; }
        .example-item { background: var(--example-bg); padding: 16px; font-size: 0.95rem; margin-bottom: 12px; border-radius: 12px; }
        .example-item.is-fav { border-left: 4px solid var(--primary); }

        .controls { padding: 20px 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; }
        .nav-btn.primary { background: var(--primary); }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>Loading WordFlow...</p></div>

<div id="quiz-overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Quiz Mode</div>
        <div style="width: 60px;"></div>
    </header>
    <div class="quiz-container">
        <div class="quiz-header-info">
            <div class="quiz-stat"><span id="quiz-score-display" class="quiz-stat-val">0</span><span class="quiz-stat-label">Score</span></div>
            <div class="quiz-stat"><span id="quiz-total-display" class="quiz-stat-val">0</span><span class="quiz-stat-label">Total Favs</span></div>
            <div class="quiz-stat"><span id="quiz-remaining-display" class="quiz-stat-val">0</span><span class="quiz-stat-label">Left</span></div>
        </div>
        <div id="quiz-question" class="quiz-sentence"></div>
        <div id="quiz-options" class="options-grid"></div>
    </div>
</div>

<div id="settings-overlay">
    <header><div onclick="closeOverlays()" class="header-btn">← Back</div><div style="font-weight:800;">Settings</div><div style="width:60px;"></div></header>
    <div class="list-container">
        <div class="settings-item" onclick="openKnown()"><span>Mastered Words</span><span>›</span></div>
        <div class="settings-item" onclick="resetDeleted()"><span style="color:var(--delete-red);">Restore Deleted Examples</span><span>›</span></div>
    </div>
</div>

<div id="fav-overlay">
    <header><div onclick="closeOverlays()" class="header-btn">← Back</div><div style="font-weight:800;">Favorites</div><div style="width:60px;"></div></header>
    <div id="fav-list" class="list-container"></div>
</div>

<div id="known-overlay">
    <header><div onclick="openSettings()" class="header-btn">← Settings</div><div style="font-weight:800;">Mastered</div><div style="width:60px;"></div></header>
    <div id="known-list" class="list-container"></div>
</div>

<header id="app-header" style="display:none;">
    <div class="header-btn" onclick="openSettings()">⚙️</div>
    <div class="header-btn fav-btn" onclick="openFavs()">★</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div onclick="playAudioFromEvent(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub"><span id="f-ipa"></span><span id="f-phonetic"></span></div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            <div class="mastery-controls">
                <div class="mastery-btn" onclick="markAsKnown(event)" style="color:var(--success-green);">👍</div>
                <div class="mastery-btn" onclick="startQuiz(event)" style="color:#FFD60A;">💡</div>
            </div>
            <div class="card-face card-back">
                <div class="back-header">
                    <div style="position:absolute; right:0; top:0; width:40%; height:100%;" onclick="flipCard()"></div>
                    <p id="b-word" class="back-word" onclick="playAudioFromEvent(event)">...</p>
                    <div id="more-btn" class="more-btn" onclick="handleMoreClick(event)">More</div>
                    <p id="b-meaning" style="font-size:1.2rem; font-weight:700; margin-top:15px;"></p>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const BIN_ID = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let wordData = [], deletedExamples = [], favExamples = [], knownWords = [];
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let availableMeanings = [], currentMeaningIdx = 0, quizScore = 0, quizPool = [], isQuizLocked = false, syncTimeout = null;

function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`; el.textContent = message;
    setTimeout(() => { el.className = ''; }, 2000);
}

window.onload = () => {
    deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
    favExamples = JSON.parse(localStorage.getItem('wf_fav_log') || "[]");
    knownWords = JSON.parse(localStorage.getItem('wf_known_words') || "[]");

    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            fetch(BIN_URL + "/latest", { headers: { "X-Master-Key": API_KEY } })
                .then(r => r.json())
                .then(d => {
                    deletedExamples = Array.from(new Set([...(d.record?.deleted || []), ...deletedExamples]));
                    favExamples = Array.from(new Set([...(d.record?.favs || []), ...favExamples]));
                    knownWords = Array.from(new Set([...(d.record?.known || []), ...knownWords]));
                    saveAndSync(false);
                }).catch(() => {});
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            updateCard();
        }
    });
};

function updateCard() {
    const item = wordData[currentIndex];
    availableMeanings = [item.MEANING];
    for(let i=1; i<=10; i++) if(item[`Meaning${i}`]) availableMeanings.push(item[`Meaning${i}`]);
    
    currentMeaningIdx = 0;
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA;
    document.getElementById('f-phonetic').textContent = item.PHONETIC;
    document.getElementById('b-word').textContent = item.WORD;
    document.getElementById('b-meaning').textContent = availableMeanings[0];
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    document.getElementById('more-btn').style.display = availableMeanings.length > 1 ? 'block' : 'none';
    document.getElementById('more-btn').textContent = `More 1/${availableMeanings.length}`;
    
    renderExamples(item);
    localStorage.setItem('wf_index_v6', currentIndex);
}

function renderExamples(item) {
    const list = document.getElementById('example-list'); list.innerHTML = "";
    const word = item.WORD.trim();
    for (let i = 1; i <= 50; i++) {
        const txt = item[i.toString()];
        if (txt && txt.trim().length > 1) {
            const id = `${word}|${txt.trim()}`;
            if (deletedExamples.includes(id)) continue;
            const div = document.createElement('div');
            div.className = `example-item ${favExamples.includes(id) ? 'is-fav' : ''}`;
            div.innerHTML = `<strong>${i}.</strong> ${txt}`;
            
            let lastTap = 0;
            div.addEventListener('touchend', () => {
                if (Date.now() - lastTap < 300) toggleFav(id);
                lastTap = Date.now();
            });
            
            let pressTimer;
            div.addEventListener('touchstart', () => {
                pressTimer = setTimeout(() => { if(confirm("Delete example?")) deleteEx(id, div); }, 750);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            list.appendChild(div);
        }
    }
}

function startQuiz(e) {
    if(e) e.stopPropagation();
    if (!favExamples.length) return alert("Add favorites first!");
    quizPool = [...favExamples];
    document.getElementById('quiz-overlay').style.display = 'flex';
    document.getElementById('quiz-total-display').textContent = favExamples.length;
    nextQuizQuestion();
}

function nextQuizQuestion() {
    if (!quizPool.length) { alert("Quiz Finished!"); return closeOverlays(); }
    isQuizLocked = false;
    document.getElementById('quiz-remaining-display').textContent = quizPool.length;
    const idx = Math.floor(Math.random() * quizPool.length);
    const [word, sent] = quizPool.splice(idx, 1)[0].split('|');
    
    document.getElementById('quiz-question').innerHTML = sent.replace(new RegExp(word, 'gi'), "<b>_________</b>");
    let opts = [word];
    while(opts.length < 6) {
        let r = wordData[Math.floor(Math.random()*wordData.length)].WORD;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    
    const grid = document.getElementById('quiz-options'); grid.innerHTML = "";
    opts.forEach(o => {
        const btn = document.createElement('div'); btn.className = 'option-btn'; btn.textContent = o;
        btn.onclick = () => {
            if(isQuizLocked) return; isQuizLocked = true;
            if(o === word) { btn.classList.add('correct'); quizScore += 10; }
            else { btn.classList.add('wrong'); quizScore = Math.max(0, quizScore - 5); }
            document.getElementById('quiz-score-display').textContent = quizScore;
            setTimeout(nextQuizQuestion, 1200);
        };
        grid.appendChild(btn);
    });
}

function markAsKnown(e) {
    if(e) e.stopPropagation();
    knownWords.push(wordData[currentIndex].WORD.trim());
    saveAndSync(); nextCard();
}

function toggleFav(id) {
    if (favExamples.includes(id)) favExamples = favExamples.filter(x => x !== id);
    else favExamples.push(id);
    saveAndSync(); updateCard();
}

function deleteEx(id, el) { deletedExamples.push(id); saveAndSync(); el.remove(); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }
function shuffleCard() { currentIndex = Math.floor(Math.random() * wordData.length); updateCard(); }
function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function handleMoreClick(e) {
    if(e) e.stopPropagation();
    currentMeaningIdx = (currentMeaningIdx + 1) % availableMeanings.length;
    document.getElementById('b-meaning').textContent = availableMeanings[currentMeaningIdx];
    document.getElementById('more-btn').textContent = `More ${currentMeaningIdx+1}/${availableMeanings.length}`;
}
function playAudioFromEvent(e) { if(e) e.stopPropagation(); playAudioByIndex(currentIndex); }
function playAudioByIndex(idx) {
    const word = wordData[idx].WORD; const num = idx + 1;
    let f = num >= 3035 ? "audio-file-4" : num >= 2027 ? "audio-file-3" : num >= 1019 ? "audio-file-2" : "audio-file";
    new Audio(`${f}/${word}.mp3`).play().catch(()=>{});
}
function jumpPrompt() {
    const val = prompt("Jump to #:");
    if(val) { currentIndex = Math.max(0, Math.min(wordData.length-1, parseInt(val)-1)); updateCard(); }
}
function saveAndSync(push = true) {
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
    localStorage.setItem('wf_known_words', JSON.stringify(knownWords));
    if(push) {
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(async () => {
            showSync('syncing', 'Syncing...');
            try {
                await fetch(BIN_URL, {
                    method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify({ deleted: deletedExamples, favs: favExamples, known: knownWords })
                });
                showSync('synced', 'Synced');
            } catch(e) {}
        }, 1500);
    }
}
function openSettings() { document.getElementById('settings-overlay').style.display = 'flex'; }
function openFavs() { /* Logic for rendering fav list same as yours */ document.getElementById('fav-overlay').style.display = 'flex'; }
function openKnown() { document.getElementById('known-overlay').style.display = 'flex'; }
function closeOverlays() { document.querySelectorAll('[id$="-overlay"]').forEach(o => o.style.display='none'); }
function resetDeleted() { if(confirm("Restore all?")) { deletedExamples = []; saveAndSync(); } }
</script>
</body>
</html>
