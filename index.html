function playAudio(e) {
    if (e) e.stopPropagation();
    
    // wordNum is 1-based (index + 1)
    const wordNum = currentIndex + 1;
    const wordText = wordData[currentIndex].WORD;
    let folder = "audio-file";

    // Corrected logic to ensure every word maps to the right folder
    if (wordNum >= 1019 && wordNum <= 2026) {
        folder = "audio-file-1";
    } else if (wordNum >= 2027 && wordNum <= 3034) {
        folder = "audio-file-2";
    } else if (wordNum >= 3035 && wordNum <= 4042) {
        folder = "audio-file-3";
    } else if (wordNum >= 4043) {
        folder = "audio-file-4";
    }

    const audioPath = `${folder}/${wordText}.mp3`;
    
    // Debugging: This will show in your browser console (F12 or Inspect)
    console.log(`Playing Word #${wordNum}: ${audioPath}`);

    const audio = new Audio(audioPath);
    audio.play().catch(err => {
        console.error("Audio failed to load. Check if file exists at:", audioPath);
    });
}
