<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4D9EFF;
            --primary-dim: rgba(77,158,255,0.12);
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --text-dim: #444;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --accent-gold: #FFD60A;
            --fav-indicator: var(--primary);
            --example-bg: var(--surface-3);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Lora', Georgia, serif;
            display: flex; flex-direction: column;
            overflow: hidden; overscroll-behavior-y: none;
        }

        /* ... (all your existing styles remain unchanged until .card section) ... */

        /* ── Main card area ── */
        .scene { 
            width: 92%; 
            max-width: 420px; 
            height: 68vh; 
            perspective: 1500px; 
            margin-bottom: 18px; 
        }

        .card {
            width: 100%; 
            height: 100%; 
            position: relative;
            transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden;
            border-radius: var(--radius-xl);
            background: var(--surface-1);
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid var(--border-bright);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Card front */
        .card-front { 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center; 
            padding: 60px 30px; 
            position: relative;
        }

        .word-container { 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
        }

        .word-display {
            font-family: 'Playfair Display', serif;
            font-size: 3.6rem; 
            font-weight: 800;
            color: var(--text-main); 
            margin: 0;
            letter-spacing: 0.01em;
        }

        .ipa-sub {
            font-size: 1rem; 
            color: var(--text-secondary);
            margin-top: 18px; 
            font-family: monospace;
            display: flex; 
            flex-direction: column; 
            gap: 6px;
            line-height: 1.5;
        }

        /* Pretty Flip Hint (replaces the old ugly button) */
        .flip-hint {
            position: absolute; 
            bottom: 32px;
            left: 50%; 
            transform: translateX(-50%);
            font-family: 'Lora', Georgia, serif;
            font-size: 0.82rem; 
            font-weight: 600;
            letter-spacing: 0.08em; 
            text-transform: uppercase;
            color: var(--primary);
            background: rgba(77,158,255,0.08);
            border: 1px solid rgba(77,158,255,0.25);
            border-radius: 50px;
            padding: 10px 28px;
            white-space: nowrap;
            opacity: 0.75;
            transition: all 0.3s ease;
            pointer-events: none; /* So it doesn't block clicks on the card */
            box-shadow: 0 4px 15px rgba(77,158,255,0.1);
        }

        .card:hover .flip-hint,
        .flip-hint.active {
            opacity: 1;
            background: rgba(77,158,255,0.12);
            transform: translateX(-50%) translateY(-2px);
        }

        @keyframes flip-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Mastery controls */
        .mastery-controls {
            position: absolute; 
            bottom: 130px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 16px; 
            align-items: center; 
            z-index: 100;
            transition: opacity 0.3s ease;
        }
        .card.is-flipped .mastery-controls { 
            opacity: 0; 
            pointer-events: none; 
        }

        .mastery-btn {
            background: var(--surface-3); 
            border-radius: 50px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 1px solid var(--border-bright);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.15s, background 0.15s;
            padding: 0 22px; 
            height: 48px;
        }
        .mastery-btn:active { transform: scale(0.93); }
        .mastery-btn.known {
            background: rgba(46,204,113,0.12);
            border-color: rgba(46,204,113,0.3);
            color: var(--success-green);
            font-family: 'Lora', Georgia, serif;
            font-size: 0.82rem; 
            font-weight: 600;
            letter-spacing: 0.06em; 
            text-transform: uppercase;
        }

        /* Card back */
        .card-back { 
            transform: rotateY(180deg); 
            display: flex; 
            flex-direction: column; 
        }

        .back-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0; 
            position: relative;
            cursor: pointer; 
            user-select: none;
        }

        /* ... rest of your existing styles (back-top-row, meaning, examples, etc.) remain unchanged ... */

    </style>
</head>
<body>

<!-- All your overlays remain unchanged -->

<header id="app-header" style="display:none;">
    <div class="header-btn" onclick="openSettings()">⚙️</div>
    <div class="header-btn fav-btn" onclick="openFavs()">★</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <!-- FRONT -->
            <div class="card-face card-front" onclick="flipCard()">
                <div class="word-container" onclick="playAudioFromEvent(event); event.stopImmediatePropagation();">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
                
                <!-- New pretty flip hint -->
                <div class="flip-hint" id="flip-hint">
                    Tap card to flip
                </div>
            </div>
            
            <div class="mastery-controls">
                <div class="mastery-btn known" onclick="markAsKnown(event); event.stopImmediatePropagation();">✓ I Know This Word</div>
            </div>

            <!-- BACK -->
            <div class="card-face card-back">
                <div class="back-header" onclick="flipCard(); event.stopImmediatePropagation();">
                    <div class="back-top-row">
                        <p id="b-word" class="back-word" onclick="playAudioFromEvent(event); event.stopImmediatePropagation();">...</p>
                        <div id="more-btn" class="more-btn" onclick="handleMoreClick(event); event.stopImmediatePropagation();">More</div>
                        <div id="type-badge" class="type-badge" style="display:none;"></div>
                    </div>
                    <div class="meaning-container">
                        <p id="b-meaning" class="meaning-text">...</p>
                    </div>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
    // ... your existing JavaScript remains mostly the same ...

    // Just replace or add this flipCard function if needed
    function flipCard() {
        const card = document.getElementById('card');
        card.classList.toggle('is-flipped');
    }

    // Optional: Hide flip hint after first flip
    function hideFlipHint() {
        const hint = document.getElementById('flip-hint');
        if (hint) hint.style.opacity = '0.3';
    }

    // Update your updateCard() to reset hint visibility if desired
    // (optional)
    // In updateCard(), after removing 'is-flipped':
    // document.getElementById('flip-hint').style.opacity = '0.75';

    // Make sure to stop propagation on inner interactive elements (already done above)

</script>

</body>
</html>
