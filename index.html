<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barron's Words">

<title>Barron's 50 — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a14;
    --surface: #12121f;
    --card-front: #16162a;
    --card-back: #0f1f2a;
    --accent: #c8a96e;
    --accent2: #6eb5c8;
    --text: #e8e4d8;
    --muted: #7a7a9a;
    --border: rgba(200,169,110,0.15);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    touch-action: pan-y;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .header-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    padding: 0 20px 12px;
    flex-shrink: 0;
  }

  .progress-bar {
    height: 2px;
    background: rgba(200,169,110,0.12);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(.25,.8,.25,1);
  }

  /* ── CARD STAGE ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    perspective: 1400px;
    position: relative;
  }

  /* ── CARD ── */
  .card-wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
    cursor: pointer;
    user-select: none;
  }

  .card-inner {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    border-radius: 20px;
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    width: 100%;
    border-radius: 20px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
  }

  /* ── FRONT ── */
  .card-front {
    background: var(--card-front);
    min-height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 32px 36px;
    position: relative;
  }

  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .word-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 8vw, 48px);
    font-weight: 700;
    color: var(--text);
    text-align: center;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .word-raw {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 1px;
    text-align: center;
    opacity: 0.85;
  }

  .flip-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0.6;
  }

  .flip-hint svg {
    width: 13px;
    height: 13px;
  }

  /* ── BACK ── */
  .card-back {
    background: var(--card-back);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    min-height: 340px;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .back-header {
    padding: 22px 24px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .back-word {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .back-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .tag-type {
    background: rgba(200,169,110,0.12);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.2);
  }

  .tag-ipa {
    background: rgba(110,181,200,0.1);
    color: var(--accent2);
    border: 1px solid rgba(110,181,200,0.2);
  }

  .tag-phonetic {
    color: var(--muted);
    font-size: 12px;
  }

  .back-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px 22px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  .meaning-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .meaning-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .examples-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .examples-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .example-item {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    color: rgba(232,228,216,0.75);
    line-height: 1.65;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .example-item:last-child {
    border-bottom: none;
  }

  .example-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    opacity: 0.6;
    margin-right: 4px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 20px 16px;
    flex-shrink: 0;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn:active { transform: scale(0.94); }

  .btn-nav {
    width: 54px;
    height: 54px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 22px;
  }

  .btn-flip {
    flex: 1;
    max-width: 200px;
    height: 54px;
    background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(110,181,200,0.15));
    color: var(--text);
    border: 1px solid rgba(200,169,110,0.25);
    letter-spacing: 0.5px;
  }

  .btn-nav:disabled { opacity: 0.3; }

  /* ── SHUFFLE BUTTON ── */
  .bottom-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 20px 10px;
    flex-shrink: 0;
  }

  .btn-small {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }

  .btn-small:active { opacity: 0.6; transform: scale(0.96); }
  .btn-small.active { color: var(--accent); border-color: rgba(200,169,110,0.35); }

  /* ── SWIPE INDICATOR ── */
  .swipe-overlay {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  /* ── DECK COMPLETE ── */
  .complete-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 40px;
    text-align: center;
    gap: 16px;
  }

  .complete-screen.visible { display: flex; }

  .complete-icon {
    font-size: 64px;
    margin-bottom: 8px;
  }

  .complete-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .complete-sub {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
  }

  .btn-restart {
    margin-top: 16px;
    padding: 14px 32px;
    background: linear-gradient(135deg, rgba(200,169,110,0.2), rgba(110,181,200,0.2));
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    touch-action: manipulation;
  }

  /* scrollbar */
  .back-body::-webkit-scrollbar { width: 3px; }
  .back-body::-webkit-scrollbar-track { background: transparent; }
  .back-body::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.2); border-radius: 2px; }

  /* card height syncing for back face */
  .card-face.card-back {
    height: auto;
    min-height: 340px;
    max-height: 65dvh;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">Barron's 50</div>
    <div class="header-count" id="counter">1 / 50</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:2%"></div>
    </div>
  </div>

  <div class="stage" id="stage">
    <!-- card rendered by JS -->
  </div>

  <div class="controls">
    <button class="btn btn-nav" id="prevBtn" onclick="nav(-1)" disabled>←</button>
    <button class="btn btn-flip" id="flipBtn" onclick="flipCard()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Flip
    </button>
    <button class="btn btn-nav" id="nextBtn" onclick="nav(1)">→</button>
  </div>

  <div class="bottom-row">
    <button class="btn-small" id="shuffleBtn" onclick="toggleShuffle()">⇄ Shuffle</button>
    <button class="btn-small" onclick="restartDeck()">↺ Restart</button>
  </div>
</div>

let deck = [...RAW_WORDS];
let idx = 0;
let isFlipped = false;
let shuffleOn = false;
let touchStartX = 0, touchStartY = 0;

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getCard() { return deck[idx]; }

function renderCard() {
  const c = getCard();
  const stage = document.getElementById('stage');
  const isLast = idx === deck.length - 1;
  const isFirst = idx === 0;

  document.getElementById('counter').textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById('progress').style.width = `${((idx + 1) / deck.length) * 100}%`;
  document.getElementById('prevBtn').disabled = isFirst;
  document.getElementById('nextBtn').disabled = false;

  const examplesHTML = c.examples.map((ex, i) =>
    `<div class="example-item"><span class="example-num">${String(i+1).padStart(2,'0')}.</span>${ex}</div>`
  ).join('');

  stage.innerHTML = `
    <div class="card-wrapper" id="cardWrapper">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="word-num">Word ${String(c.n).padStart(2,'0')}</div>
          <div class="word-main">${c.word}</div>
          <div class="word-raw">${c.phonetic} / ${c.ipa} /</div>
          <div class="flip-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            tap to flip
          </div>
        </div>
        <div class="card-face card-back">
          <div class="back-header">
            <div class="back-word">${c.word}</div>
            <div class="back-meta">
              <span class="tag tag-type">${c.type}</span>
              <span class="tag tag-ipa">${c.ipa}</span>
              <span class="tag tag-phonetic">${c.phonetic}</span>
            </div>
          </div>
          <div class="back-body">
            <div class="meaning-label">Meaning</div>
            <div class="meaning-text">${c.meaning}</div>
            <div class="examples-label">Examples</div>
            ${examplesHTML}
          </div>
        </div>
      </div>
    </div>`;

  isFlipped = false;
  document.getElementById('flipBtn').textContent = '⇄ Flip';

  // attach touch events
  const wrapper = document.getElementById('cardWrapper');
  wrapper.addEventListener('click', flipCard);
  wrapper.addEventListener('touchstart', onTouchStart, {passive: true});
  wrapper.addEventListener('touchend', onTouchEnd, {passive: true});
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  if (!inner) return;
  isFlipped = !isFlipped;
  inner.classList.toggle('flipped', isFlipped);
  document.getElementById('flipBtn').textContent = isFlipped ? '⇄ Word' : '⇄ Flip';
}

function nav(dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= deck.length) return;
  idx = newIdx;
  renderCard();
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  const btn = document.getElementById('shuffleBtn');
  btn.classList.toggle('active', shuffleOn);
  if (shuffleOn) {
    deck = shuffleArr([...RAW_WORDS]);
  } else {
    deck = [...RAW_WORDS];
  }
  idx = 0;
  renderCard();
}

function restartDeck() {
  idx = 0;
  if (shuffleOn) deck = shuffleArr([...RAW_WORDS]);
  else deck = [...RAW_WORDS];
  renderCard();
}

// Swipe support
function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}

function onTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0 && idx < deck.length - 1) nav(1);
    else if (dx > 0 && idx > 0) nav(-1);
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nav(1);
  else if (e.key === 'ArrowLeft') nav(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// init
renderCard();
</script>
