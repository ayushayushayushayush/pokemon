<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow Pro">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4D9EFF;
            --bg: #000000;
            --surface-1: #0A0A0A;
            --surface-2: #111111;
            --surface-3: #1A1A1A;
            --surface-4: #222222;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --text-main: #F0F0F0;
            --text-secondary: #666;
            --delete-red: #FF4545;
            --success-green: #2ECC71;
            --radius-md: 16px;
            --radius-xl: 32px;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Lora', Georgia, serif; display: flex; flex-direction: column;
            overflow: hidden; overscroll-behavior-y: none;
        }

        /* ── Overlays (Favorites, Settings, etc) ── */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
            user-select: none; /* Disable text selection as requested */
        }
        .list-container { flex: 1; overflow-y: auto; padding: 8px 18px 24px; -webkit-overflow-scrolling: touch; }

        /* ── Header Styles ── */
        header { padding: calc(var(--safe-top) + 16px) 20px 12px; display: flex; justify-content: space-between; align-items: center; }
        .header-btn {
            font-family: 'Lora', Georgia, serif; font-weight: 600; font-size: 0.78rem;
            padding: 8px 14px; border-radius: 10px; cursor: pointer;
            background: var(--surface-3); color: var(--text-main); border: 1px solid var(--border);
        }
        .counter {
            font-family: 'Playfair Display', serif; font-size: 0.8rem; font-weight: 700;
            color: var(--text-secondary); background: var(--surface-2);
            padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
        }

        /* ── Quiz Score Bar ── */
        #quiz-score-bar {
            background: var(--surface-2); height: 6px; width: 100%;
            position: relative; overflow: hidden;
        }
        #quiz-progress {
            background: var(--primary); height: 100%; width: 0%;
            transition: width 0.3s ease;
        }

        /* ── Card Styles ── */
        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 18px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: var(--radius-xl); background: var(--surface-1);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border-bright);
        }
        .card-front { justify-content: center; align-items: center; text-align: center; }
        .word-display { font-family: 'Playfair Display', serif; font-size: 3.4rem; font-weight: 800; margin: 0; }
        .card-back { transform: rotateY(180deg); }

        /* ── Favorites Page Specifics ── */
        .fav-group-header { margin: 24px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .fav-word-title { font-family: 'Playfair Display', serif; color: var(--delete-red); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; }
        .fav-ipa { font-size: 0.8rem; color: var(--text-secondary); margin-left: 8px; font-family: monospace; }
        .example-item {
            background: var(--surface-2); padding: 14px 16px; font-size: 0.95rem; line-height: 1.5;
            color: #ccc; margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border);
        }

        /* ── Quiz Grid ── */
        .quiz-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .quiz-sentence { font-size: 1.15rem; background: var(--surface-2); padding: 20px; border-radius: 16px; min-height: 100px; line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn { background: var(--surface-2); padding: 18px 10px; border-radius: 12px; text-align: center; font-weight: 600; border: 1px solid var(--border); }
        .option-btn.correct { background: rgba(46,204,113,0.2); border-color: var(--success-green); color: var(--success-green); }
        .option-btn.wrong { background: rgba(255,69,69,0.2); border-color: var(--delete-red); color: var(--delete-red); }

        .controls { padding: 16px 18px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 58px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface-3); color: #fff; font-weight: 700; }
        .nav-btn.primary { background: var(--primary); border: none; }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">LOADING...</div>

<div id="fav-overlay" class="overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Favorites</div>
        <div class="header-btn" onclick="startQuiz()">💡 Quiz</div>
    </header>
    <div id="fav-list" class="list-container"></div>
</div>

<div id="settings-overlay" class="overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div style="font-weight:800;">Settings</div>
        <div style="width:60px;"></div>
    </header>
    <div class="list-container">
        <div onclick="openKnown()" class="example-item">Mastered Words ›</div>
        <div onclick="resetDeleted()" class="example-item" style="color:var(--delete-red);">Restore Deleted Examples</div>
    </div>
</div>

<div id="known-overlay" class="overlay">
    <header>
        <div onclick="openSettings()" class="header-btn" style="color:var(--primary);">← Settings</div>
        <div style="font-weight:800;">Mastered</div>
        <div style="width:60px;"></div>
    </header>
    <div id="known-list" class="list-container"></div>
</div>

<div id="quiz-overlay" class="overlay">
    <header>
        <div onclick="closeOverlays()" class="header-btn" style="color:var(--primary);">← Back</div>
        <div id="quiz-score-text" style="font-weight:800; font-size:0.8rem;">0/0</div>
        <div style="width:60px;"></div>
    </header>
    <div id="quiz-score-bar"><div id="quiz-progress"></div></div>
    <div class="quiz-container">
        <div id="quiz-question" class="quiz-sentence"></div>
        <div id="quiz-options" class="options-grid"></div>
    </div>
</div>

<header id="app-header" style="display:none;">
    <div class="header-btn" onclick="openSettings()">⚙️</div>
    <div class="header-btn" onclick="openFavs()">★</div>
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <h1 id="f-word" class="word-display">...</h1>
                <div id="f-ipa" style="color:var(--text-secondary); margin-top:10px;"></div>
                <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
                    <button class="header-btn" onclick="markAsKnown(event)" style="color:var(--success-green); border-color:var(--success-green);">✓ Mastered</button>
                </div>
            </div>
            <div class="card-face card-back">
                <div style="padding:20px; border-bottom:1px solid var(--border);">
                    <h2 id="b-word" style="font-family:'Playfair Display'; color:var(--delete-red); margin:0;"></h2>
                    <p id="b-meaning" style="margin:10px 0 0; font-weight:500;"></p>
                </div>
                <div id="example-list" class="list-container"></div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const BIN_ID = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let favExamples = JSON.parse(localStorage.getItem('wf_fav_log') || "[]");
let knownWords = JSON.parse(localStorage.getItem('wf_known_words') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);

let quizPool = [];
let quizTotal = 0;
let quizCorrect = 0;
let quizAttemptCount = 0;

window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: function(results) {
            wordData = results.data.filter(row => row.WORD);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            updateCard();
        }
    });
};

function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

function updateCard() {
    const item = wordData[currentIndex];
    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);
    
    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA || '';
    document.getElementById('b-word').textContent = item.WORD;
    document.getElementById('b-meaning').textContent = item.MEANING;
    
    renderExamples(item);
}

function renderExamples(item) {
    const list = document.getElementById('example-list');
    list.innerHTML = "";
    const word = item.WORD.trim();
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${word}|${text.trim()}`;
            if (deletedExamples.includes(exId)) continue;
            const div = document.createElement('div');
            div.className = 'example-item';
            if (favExamples.includes(exId)) div.style.color = 'var(--delete-red)';
            div.innerHTML = text.trim();
            list.appendChild(div);
        }
    }
}

function renderFavList() {
    const list = document.getElementById('fav-list');
    list.innerHTML = "";
    const groups = {};
    favExamples.forEach(exId => {
        const [w, txt] = exId.split('|');
        if (!groups[w]) groups[w] = [];
        groups[w].push({ id: exId, text: txt });
    });

    Object.keys(groups).sort().forEach(w => {
        const wordObj = wordData.find(x => x.WORD.trim() === w);
        const header = document.createElement('div');
        header.className = 'fav-group-header';
        header.innerHTML = `<span class="fav-word-title">${w}</span> <span class="fav-ipa">${wordObj?.IPA || ''}</span>`;
        
        // Long press on Word Header to jump to flipped card
        let headerTimer;
        header.ontouchstart = () => {
            headerTimer = setTimeout(() => {
                const idx = wordData.findIndex(x => x.WORD.trim() === w);
                if(idx !== -1) {
                    currentIndex = idx;
                    updateCard();
                    setTimeout(() => document.getElementById('card').classList.add('is-flipped'), 100);
                    closeOverlays();
                }
            }, 600);
        };
        header.ontouchend = () => clearTimeout(headerTimer);
        list.appendChild(header);
        
        groups[w].forEach(ex => {
            const item = document.createElement('div');
            item.className = 'example-item';
            item.textContent = ex.text;
            
            let exTimer;
            item.ontouchstart = (e) => {
                const startX = e.touches[0].clientX;
                exTimer = setTimeout(() => {
                    if (startX < window.innerWidth / 2) {
                        favExamples = favExamples.filter(x => x !== ex.id);
                        item.remove();
                        saveAndSync();
                    }
                }, 600);
            };
            item.ontouchend = () => clearTimeout(exTimer);
            list.appendChild(item);
        });
    });
}

function startQuiz() {
    if(favExamples.length < 6) { alert("Need 6 favorites to quiz!"); return; }
    quizPool = [...favExamples].sort(() => Math.random() - 0.5);
    quizTotal = quizPool.length;
    quizCorrect = 0;
    document.getElementById('fav-overlay').style.display = 'none';
    document.getElementById('quiz-overlay').style.display = 'flex';
    nextQuizQuestion();
}

function nextQuizQuestion() {
    if(quizPool.length === 0) { alert(`Finished! Score: ${quizCorrect}/${quizTotal}`); closeOverlays(); return; }
    
    quizAttemptCount = 0;
    const ex = quizPool.pop();
    const [word, sentence] = ex.split('|');
    const masked = sentence.replace(new RegExp(word, 'gi'), "<b>_______</b>");
    
    document.getElementById('quiz-question').innerHTML = masked;
    document.getElementById('quiz-score-text').textContent = `${quizCorrect} / ${quizTotal}`;
    document.getElementById('quiz-progress').style.width = `${((quizTotal - quizPool.length - 1) / quizTotal) * 100}%`;

    let options = [word];
    while(options.length < 6) {
        const rw = wordData[Math.floor(Math.random() * wordData.length)].WORD;
        if(!options.includes(rw)) options.push(rw);
    }
    options.sort(() => Math.random() - 0.5);

    const grid = document.getElementById('quiz-options');
    grid.innerHTML = "";
    options.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => {
            if(btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
            
            quizAttemptCount++;
            if(opt === word) {
                btn.classList.add('correct');
                quizCorrect++;
                setTimeout(nextQuizQuestion, 800);
            } else {
                btn.classList.add('wrong');
                // Move on after 3 wrong choices (total 3 selections)
                if(quizAttemptCount >= 3) {
                    setTimeout(nextQuizQuestion, 800);
                }
            }
        };
        grid.appendChild(btn);
    });
}

function openSettings() { closeOverlays(); document.getElementById('settings-overlay').style.display = 'flex'; }
function openFavs() { closeOverlays(); document.getElementById('fav-overlay').style.display = 'flex'; renderFavList(); }
function openKnown() { closeOverlays(); document.getElementById('known-overlay').style.display = 'flex'; 
    document.getElementById('known-list').innerHTML = knownWords.map(w => `<div class="example-item">${w}</div>`).join('');
}

function closeOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

function jumpPrompt() {
    const val = prompt("Jump to word #:", currentIndex + 1);
    if(val) {
        const n = parseInt(val) - 1;
        if(n >= 0 && n < wordData.length) { currentIndex = n; updateCard(); }
    }
}

function markAsKnown(e) {
    if(e) e.stopPropagation();
    const w = wordData[currentIndex].WORD.trim();
    if(!knownWords.includes(w)) { knownWords.push(w); saveAndSync(); nextCard(); }
}

function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }

function saveAndSync() {
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    localStorage.setItem('wf_fav_log', JSON.stringify(favExamples));
    localStorage.setItem('wf_known_words', JSON.stringify(knownWords));
}

function resetDeleted() { if(confirm("Restore all deleted examples?")) { deletedExamples = []; saveAndSync(); alert("Restored!"); } }
</script>
</body>
</html>
