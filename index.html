<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordFlow">
    
    <title>WordFlow Pro</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --primary: #0A84FF; 
            --bg: #000000;      
            --card-bg: #1C1C1E; 
            --text-main: #FFFFFF; 
            --text-secondary: #AEAEB2;
            --delete-red: #FF453A;
            --example-bg: #2C2C2E;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }

        #sync-status {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #sync-status.show { opacity: 1; }
        #sync-status.syncing { background: #3a3a3c; color: var(--text-secondary); }
        #sync-status.synced  { background: #1c3a1c; color: #30d158; }

        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .counter { 
            font-size: 0.85rem; 
            font-weight: 700;
            color: var(--text-main); 
            background: #3a3a3c; 
            padding: 6px 14px; 
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .counter:active {
            background: var(--primary);
        }

        .app-container { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .scene { width: 92%; max-width: 420px; height: 68vh; perspective: 1500px; margin-bottom: 20px; }
        
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: var(--card-bg); 
            display: flex;
            flex-direction: column; 
            overflow: hidden;
            border: 1px solid #38383a;
        }

        .card-front { 
            justify-content: flex-start; 
            align-items: center; 
            text-align: center; 
            padding: 60px 30px; 
        }
        
        .word-display { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .ipa-sub { 
            font-size: 1.2rem; 
            color: var(--text-secondary); 
            margin-top: 15px; 
            font-family: monospace; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flip-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 15px;
        }

        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; }
        
        .back-header { 
            padding: 25px 25px 15px; 
            border-bottom: 1px solid #38383a;
            flex-shrink: 0;
        }

        .back-top-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .back-word {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--delete-red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .more-btn {
            background: var(--primary);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .more-btn.busy { opacity: 0.5; pointer-events: none; }

        .meaning-container {
            min-height: 60px;
            display: block;
        }

        .meaning-text { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.4; 
            margin: 0; 
            transition: opacity 0.1s ease-in-out;
            overflow-wrap: break-word;
            display: block;
            width: 100%;
        }
        
        #example-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px 25px 30px; 
            -webkit-overflow-scrolling: touch;
        }

        .example-item { 
            background: var(--example-bg); 
            padding: 16px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            color: #E5E5EA;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: opacity 0.3s ease;
            -webkit-user-select: none;
        }

        .ex-num { color: #FFFFFF; font-weight: 800; margin-right: 8px; }

        .controls { padding: 0 20px calc(var(--safe-bottom) + 20px); display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .nav-btn { flex: 1; height: 60px; border-radius: 18px; border: none; background: #2C2C2E; color: white; font-weight: 700; font-size: 0.9rem; }
        .nav-btn.primary { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="sync-status"></div>
<div id="loading-screen"><p>Loading...</p></div>

<header id="app-header" style="display:none;">
    <div onclick="resetDeleted()" style="color:var(--delete-red); font-weight:600; font-size:0.8rem; padding: 10px 0;">Restore</div> 
    <div id="counter" class="counter" onclick="jumpPrompt()">0 / 0</div>
</header>

<div class="app-container" id="app">
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word-container" onclick="playAudio(event)">
                    <h1 id="f-word" class="word-display">...</h1>
                    <div class="ipa-sub">
                        <span id="f-ipa"></span>
                        <span id="f-phonetic"></span>
                    </div>
                </div>
                <div class="flip-hint" onclick="flipCard()">Tap to Flip</div>
            </div>
            
            <div class="card-face card-back">
                <div class="back-header">
                    <div class="back-top-row">
                        <p id="b-word" class="back-word" onclick="flipCard()">...</p>
                        <div id="more-btn" class="more-btn" onclick="handleMoreClick(event)">More</div>
                    </div>
                    <div class="meaning-container" onclick="flipCard()">
                        <p id="b-meaning" class="meaning-text">...</p>
                    </div>
                </div>
                <div id="example-list"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevCard()">Back</button>
        <button class="nav-btn" onclick="shuffleCard()">Shuffle</button>
        <button class="nav-btn primary" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
const BIN_ID  = "69d3dacfaaba882197cd5a0e";
const API_KEY = "$2a$10$2XIWmqUVHyv39zmLplK6YOCLf07sb3WyJIxxleZUrKRb61lugMCu6";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let wordData = [];
let deletedExamples = JSON.parse(localStorage.getItem('wf_deleted_log') || "[]");
let currentIndex = parseInt(localStorage.getItem('wf_index_v6') || 0);
let availableMeanings = [];
let currentMeaningIdx = 0;
let syncTimeout = null;
let isTransitioning = false;

function showSync(state, message) {
    const el = document.getElementById('sync-status');
    el.className = `show ${state}`;
    el.textContent = message;
    setTimeout(() => { el.className = ''; }, 2000);
}

window.onload = () => {
    Papa.parse("words.csv", {
        download: true, header: true,
        complete: async function(results) {
            wordData = results.data.filter(row => row.WORD);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('app-header').style.display = 'flex';
            updateCard();
        }
    });
};

function updateCard() {
    const item = wordData[currentIndex];
    isTransitioning = false;
    
    const meaningEl = document.getElementById('b-meaning');
    meaningEl.innerText = ""; 
    
    availableMeanings = [];
    if (item.MEANING && item.MEANING.trim()) availableMeanings.push(item.MEANING.trim());
    for(let i=1; i<=10; i++) {
        let val = item[`Meaning${i}`];
        if(val && val.trim()) availableMeanings.push(val.trim());
    }
    currentMeaningIdx = 0;

    document.getElementById('card').classList.remove('is-flipped');
    document.getElementById('counter').textContent = `${currentIndex + 1} / ${wordData.length}`;
    localStorage.setItem('wf_index_v6', currentIndex);

    document.getElementById('f-word').textContent = item.WORD;
    document.getElementById('f-ipa').textContent = item.IPA;
    document.getElementById('f-phonetic').textContent = item.PHONETIC;
    document.getElementById('b-word').textContent = item.WORD;
    
    meaningEl.innerText = availableMeanings[0] || "";
    meaningEl.style.opacity = 1;
    
    const moreBtn = document.getElementById('more-btn');
    moreBtn.classList.remove('busy');
    if (availableMeanings.length > 1) {
        moreBtn.style.display = 'block';
        moreBtn.textContent = `More 1/${availableMeanings.length}`;
    } else {
        moreBtn.style.display = 'none';
    }

    renderExamples(item);
}

function handleMoreClick(e) {
    if (e) e.stopPropagation();
    if (availableMeanings.length <= 1 || isTransitioning) return;

    isTransitioning = true;
    const meaningEl = document.getElementById('b-meaning');
    const moreBtn = document.getElementById('more-btn');

    moreBtn.classList.add('busy');
    meaningEl.style.opacity = 0;

    setTimeout(() => {
        meaningEl.innerText = ""; 
        currentMeaningIdx = (currentMeaningIdx + 1) % availableMeanings.length;
        meaningEl.innerText = availableMeanings[currentMeaningIdx];
        moreBtn.textContent = `More ${currentMeaningIdx + 1}/${availableMeanings.length}`;
        meaningEl.style.opacity = 1;
        
        setTimeout(() => {
            isTransitioning = false; 
            moreBtn.classList.remove('busy');
        }, 50);
    }, 120); 
}

function renderExamples(item) {
    const list = document.getElementById('example-list');
    list.innerHTML = "";
    let count = 1;
    for (let i = 1; i <= 50; i++) {
        const text = item[i.toString()];
        if (text && text.trim().length > 1) {
            const exId = `${item.WORD}|${text.trim()}`;
            if (!deletedExamples.includes(exId)) {
                const exDiv = document.createElement('div');
                exDiv.className = 'example-item';
                exDiv.innerHTML = `<span class="ex-num">${count}.</span>${text}`;
                
                let pressTimer;
                exDiv.addEventListener('touchstart', () => {
                    pressTimer = setTimeout(() => { if (confirm("Delete?")) deleteEx(exId, exDiv); }, 750);
                }, {passive: true});
                exDiv.addEventListener('touchend', () => clearTimeout(pressTimer));
                exDiv.addEventListener('contextmenu', (e) => e.preventDefault());

                list.appendChild(exDiv);
                count++;
            }
        }
    }
}

function deleteEx(id, el) {
    deletedExamples.push(id);
    localStorage.setItem('wf_deleted_log', JSON.stringify(deletedExamples));
    el.remove();
    pushSync();
}

async function pushSync() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(async () => {
        showSync('syncing', 'Syncing...');
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify({ deleted: deletedExamples })
            });
            showSync('synced', 'Synced');
        } catch { }
    }, 1000);
}

function playAudio(e) {
    if (e) e.stopPropagation();
    const wordNum = currentIndex + 1;
    const wordText = wordData[currentIndex].WORD;
    let folder = "audio-file";
    if (wordNum >= 1019 && wordNum <= 2026) folder = "audio-file-2";
    else if (wordNum >= 2027 && wordNum <= 3034) folder = "audio-file-3";
    else if (wordNum >= 3035) folder = "audio-file-4";
    new Audio(`${folder}/${wordText}.mp3`).play().catch(() => {});
}

function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
function nextCard() { currentIndex = (currentIndex + 1) % wordData.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + wordData.length) % wordData.length; updateCard(); }
function shuffleCard() { currentIndex = Math.floor(Math.random() * wordData.length); updateCard(); }

function jumpPrompt() {
    const val = prompt(`Jump to (1 - ${wordData.length}):`);
    if (val) {
        const num = parseInt(val);
        if (!isNaN(num)) {
            currentIndex = Math.max(0, Math.min(wordData.length - 1, num - 1));
            updateCard();
        }
    }
}

function resetDeleted() {
    if (confirm("Restore all?")) {
        deletedExamples = [];
        localStorage.removeItem('wf_deleted_log');
        updateCard();
        pushSync();
    }
}
</script>
</body>
</html>
